<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>Relovetree - 시작하기</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/empty-state.css">
</head>
<body class="es-page">
    <div class="es-frame">
        <header class="es-header">
            <span class="logo-ico">🌱</span>
            <h2>"아직 러브트리가 없어요"</h2>
            <p>처음 좋아하게 된 순간부터<br>하나씩 이어보세요</p>
        </header>

        <div class="es-visual">
            <div class="float-cards">
                <div class="f-node f1"></div>
                <div class="f-node f2"></div>
                <div class="f-node f3"></div>
            </div>
            <div class="es-sprout"></div>
            <div class="es-plant"></div>
        </div>

        <button class="btn-start">첫 순간 기록하기</button>

        <div class="es-tags">
            <span class="es-tag">🏷️ 입덕</span>
            <span class="es-tag">🏷️ 첫 콘서트</span>
            <span class="es-tag">🏷️ 최애 무대</span>
        </div>
    </div>
</body>
</html>
