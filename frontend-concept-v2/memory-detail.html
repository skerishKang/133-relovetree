<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>메모리 상세 - Relovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/memory-detail.css">
</head>
<body class="md-page">
    <div class="md-frame">
        <header class="md-header">
            <button class="btn-ico">←</button>
            <h2>Relovetree</h2>
            <button class="btn-ico">•••</button>
        </header>

        <main class="md-scroll">
            <div class="md-video"></div>

            <section class="md-title-sec">
                <h3>첫 콘서트의 전율</h3>
                <p class="date">2023.11.15</p>
            </section>

            <div class="md-tags">
                <span class="md-tag">설렘</span>
                <span class="md-tag">감동</span>
                <span class="md-tag">행복</span>
            </div>

            <div class="md-memo-card">
                <b>Memo</b>
                <p>
                    오늘 드디어 첫 콘서트에 갔다...!!! 현장 분위기가 정말 대박이었고 오프닝 곡 나올 때 온몸에 소름이 쫙 돋았다. 떼창할 때 그 전율은 평생 못 잊을 것 같다. 너무 행복했다 ㅠㅠ 다음에 또 가고 싶다.
                </p>
                <div class="memo-pen">✍️</div>
            </div>

            <section class="md-connected">
                <h4>이 순간과 이어진 기억</h4>
                <div class="md-conn-list">
                    <div class="md-conn-item">
                        <div class="mci-thumb"></div>
                        <div class="mci-text">
                            <h5>콘서트 티켓 수령</h5>
                            <p>2023.11.15</p>
                        </div>
                    </div>
                    <div class="md-conn-item">
                        <div class="mci-thumb" style="background:#d3c4bb;"></div>
                        <div class="mci-text">
                            <h5>굿즈 줄서기</h5>
                            <p>2023.11.15</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="md-footer">
            <div class="mf-btn"><span>❤️</span>125</div>
            <div class="mf-btn muted"><span>💬</span>3</div>
            <div class="mf-btn muted"><span>↗️</span>Share</div>
            <div class="mf-btn muted"><span>✏️</span>Edit</div>
        </footer>
    </div>
</body>
</html>
