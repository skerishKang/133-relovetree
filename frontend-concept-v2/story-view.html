<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>팬 메모리 - Relovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/story-view.css">
</head>
<body class="sv-page">
    <div class="sv-frame">
        <header class="sv-header">
            <h1>FAN MEMORIES</h1>
        </header>

        <main class="sv-carousel">
            <!-- Left partial card -->
            <div class="sv-card side left"></div>
            
            <!-- Center active card -->
            <div class="sv-card">
                <div class="sc-video">
                    <div class="play-btn"></div>
                </div>
                <div class="sc-info">
                    <h2>Video Title</h2>
                    <p class="date">Date</p>
                </div>
                <div class="sc-tags">
                    <span class="sc-tag t1">#Memorable</span>
                    <span class="sc-tag t2">#Joyful</span>
                    <span class="sc-tag t3">#Throwback</span>
                </div>
                <div class="sc-desc">
                    My first concert experience...<br>
                    It was amazing!<br>
                    [Fictional event notes]
                </div>
            </div>

            <!-- Right partial card -->
            <div class="sv-card side right"></div>
        </main>

        <div class="sv-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <nav class="sv-nav">
            <div class="nav-ico i-home"></div>
            <div class="nav-ico i-box"></div>
            <div class="nav-ico i-search"></div>
            <div class="nav-ico i-user"></div>
        </nav>
    </div>
</body>
</html>
