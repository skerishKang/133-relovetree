<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>순간 연결 - Lovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/mobile-add-branch.css">
</head>
<body class="mab-page">
    <div class="mab-frame">
        <header class="mab-header">
            <button class="btn-back">←</button>
            <h2>어느 순간과 연결할까요?</h2>
        </header>

        <main class="mab-scroll">
            <div class="branch-tree">
                <div class="bt-line"></div>
                
                <div class="bt-node">
                    <div class="thumb"></div>
                </div>

                <div class="bt-node active">
                    <div class="thumb"></div>
                </div>

                <div class="bt-node">
                    <div class="thumb"></div>
                </div>

                <!-- Floating placeholder from mockup -->
                <div class="add-placeholder">
                    <span>+</span>
                    <p>이 순간 뒤에 연결하기</p>
                </div>
            </div>
        </main>

        <footer class="mab-footer">
            <button class="btn-connect">이 순간 뒤에 연결하기</button>
        </footer>
    </div>
</body>
</html>
