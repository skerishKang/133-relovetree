<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>영상 검색 - Lovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/video-search.css">
</head>
<body class="vs-page">
    <header class="vs-header">
        <div class="shell vs-nav">
            <div class="logo">🌱 Lovetree</div>
            <div class="vs-search-bar">
                <span>🔍</span>
                <input type="text" value="BTS Proof 라이브 다시보기">
            </div>
            <div class="avatar"></div>
        </div>
    </header>

    <main class="vs-main">
        <h2>검색 결과</h2>
        
        <div class="vs-list">
            <!-- Item 1 -->
            <div class="vs-item">
                <div class="vs-thumb"></div>
                <div class="vs-info">
                    <h3>BTS (방탄소년단) 'Proof' Live Performance (feat. Anderson .Paak)</h3>
                    <p class="vs-meta">BANGTANTV • 조회수 5.2M회 • 1년 전</p>
                    <button class="btn-save-video"><span>🎥</span> 내 러브트리에 저장</button>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="vs-item">
                <div class="vs-thumb" style="background:#d3c4bb;"></div>
                <div class="vs-info">
                    <h3>[CHOREOGRAPHY] BTS (방탄소년단) 'Yet To Come' Dance Practice</h3>
                    <p class="vs-meta">BANGTANTV • 조회수 12M회 • 11개월 전</p>
                    <button class="btn-save-video"><span>🎥</span> 내 러브트리에 저장</button>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="vs-item">
                <div class="vs-thumb" style="background:#dfd6c4;"></div>
                <div class="vs-info">
                    <h3>BTS 'Proof' Album Showcase Special Stage</h3>
                    <p class="vs-meta">HYBE LABELS • 조회수 843K회 • 1년 전</p>
                    <button class="btn-save-video"><span>🎥</span> 내 러브트리에 저장</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
