<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>모바일 트리 - Relovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/mobile-tree.css">
</head>
<body class="mob-page">
    <div class="mob-frame">
        <header class="mob-top">
            <h2>처음 빠진 순간부터 이어진 사랑의 흐름</h2>
            <p>테스트 러버 A님의 입덕부터 지금까지의 러브트리</p>
        </header>

        <main class="mob-scroll">
            <div class="mob-stem-container">
                <svg class="stem-svg" viewBox="0 0 40 800" preserveAspectRatio="none">
                    <path class="stem-path" d="M20,0 C30,100 10,200 20,300 C30,400 10,500 20,600 C30,700 10,800 20,900" />
                </svg>
            </div>

            <!-- Row 1 -->
            <div class="m-node-row">
                <div class="m-node">
                    <div class="thumb" style="background: #ead3d3;"><div class="play-ico" style="transform: scale(0.6)"><span></span></div></div>
                    <h4>첫 단독 콘서트 감동</h4>
                    <span class="date">2023.11.15</span>
                    <div><span class="m-tag">#심쿵</span></div>
                    <div class="m-stats">❤️ 128 &nbsp; 💬 35</div>
                </div>
            </div>

            <!-- Row 2 -->
            <div class="m-node-row">
                <div class="m-node">
                    <div class="thumb" style="background: #d3e2ea;"><div class="play-ico" style="transform: scale(0.6)"><span></span></div></div>
                    <h4>최애 생일 라이브를 기다리던 밤</h4>
                    <span class="date">2023.06.01</span>
                    <div><span class="m-tag">#눈물</span></div>
                    <div class="m-stats">❤️ 128 &nbsp; 💬 35</div>
                </div>
            </div>

            <!-- Row 3 -->
            <div class="m-node-row">
                <div class="m-node">
                    <div class="thumb"><div class="play-ico" style="transform: scale(0.6)"><span></span></div></div>
                    <h4>처음으로 배경화면 바꾼 날</h4>
                    <span class="date">2023.05.12</span>
                    <div><span class="m-tag">#추억</span></div>
                    <div class="m-stats">❤️ 125 &nbsp; 💬 39</div>
                </div>
            </div>

            <!-- Row 4 -->
            <div class="m-node-row">
                <div class="m-node">
                    <div class="thumb" style="background: #dfd6c4;"><div class="play-ico" style="transform: scale(0.6)"><span></span></div></div>
                    <h4>유튜브 레전드 직캠 발견</h4>
                    <span class="date">2022.06.01</span>
                    <div><span class="m-tag">#심쿵</span></div>
                    <div class="m-stats">❤️ 128 &nbsp; 💬 35</div>
                </div>
            </div>
            
            <button class="mob-bottom-btn">이 사랑의 연결을 다른 팬과 공유하기</button>
        </main>

        <nav class="mob-tabs">
            <span class="tab-ico active">🏠</span>
            <span class="tab-ico">🧭</span>
            <span class="tab-ico">👤</span>
        </nav>
    </div>
</body>
</html>
