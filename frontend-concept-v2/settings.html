<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>설정 - Relovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body class="settings-page">
    <div class="settings-frame">
        <header class="s-head">
            <button class="btn-s-back">←</button>
            <h2>공개 범위 설정</h2>
        </header>

        <main class="s-scroll">
            <section class="s-group">
                <div class="opt-card active">
                    <div class="opt-ico">👤🔒</div>
                    <div class="opt-text">
                        <h4>나만 보기</h4>
                        <p>본인만 LoveTree를 볼 수 있습니다.</p>
                    </div>
                    <div class="radio-check"></div>
                </div>

                <div class="opt-card">
                    <div class="opt-ico">🔗</div>
                    <div class="opt-text">
                        <h4>링크를 가진 사람만</h4>
                        <p>링크를 알고 있는 사람에게만<br>LoveTree가 공개됩니다.</p>
                    </div>
                    <div class="radio-check"></div>
                    <button class="btn-copy-link">Copy Link</button>
                </div>

                <div class="opt-card">
                    <div class="opt-ico">🌐</div>
                    <div class="opt-text">
                        <h4>커뮤니티에 공개</h4>
                        <p>모든 Relovetree 사용자가 커뮤니티에서<br>검색하고 볼 수 있습니다.</p>
                    </div>
                    <div class="radio-check"></div>
                </div>
            </section>

            <section class="s-group">
                <div class="toggle-row">
                    <div class="tr-text">
                        <h5>댓글 허용</h5>
                        <p>다른 사용자가 댓글을 남길 수 있습니다.</p>
                    </div>
                    <div class="s-switch on"></div>
                </div>
                
                <div class="toggle-row">
                    <div class="tr-text">
                        <h5>좋아요 허용</h5>
                        <p>좋아요 표현을 받을 수 있습니다.</p>
                    </div>
                    <div class="s-switch on"></div>
                </div>

                <div class="toggle-row">
                    <div class="tr-text">
                        <h5>프로필 이름 공개</h5>
                        <p>트리 옆에 표시 이름을 공개합니다.</p>
                    </div>
                    <div class="s-switch on"></div>
                </div>
            </section>
        </main>

        <footer class="s-footer">
            <button class="btn-save-settings">저장</button>
        </footer>
    </div>
</body>
</html>
