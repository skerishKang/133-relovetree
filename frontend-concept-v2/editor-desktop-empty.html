<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>새 트리 만들기 - Lovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/editor-desktop-empty.css">
</head>
<body class="ede-page">
    <aside class="ede-sidebar">
        <div class="logo">🌱 Lovetree</div>
        <nav class="ede-nav">
            <a href="home.html" class="ede-nav-item">🏠 홈</a>
            <a href="my-trees.html" class="ede-nav-item active">📂 내 러브트리</a>
            <a href="settings.html" class="ede-nav-item">⚙️ 설정</a>
        </nav>
    </aside>

    <main class="ede-workspace">
        <div class="canvas-empty">
            <div class="empty-prompt">
                <h2>첫 순간을 기록해 볼까요?</h2>
                <p>당신과 최애가 만난 그 특별한 순간부터<br>하나씩 러브트리를 키워보세요.</p>
                <button class="btn-big-add">+ 첫 메모리 추가하기</button>
                
                <div class="empty-deco">
                    <span class="tag-guide">🏷️ 입덕</span>
                    <span class="tag-guide">🏷️ 첫 콘서트</span>
                    <span class="tag-guide">🏷️ 최애 무대</span>
                </div>
            </div>
        </div>
    </main>
