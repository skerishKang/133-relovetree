<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Relovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <div class="l-deco-1"></div>
    <div class="l-deco-2"></div>
    <div class="l-deco-3">//</div>

    <div class="login-frame">
        <header class="login-title">
            <h1>나만의 첫 순간부터<br>러브트리를 계속 이어가보세요</h1>
            <p>기록한 순간을 안전하게 저장하고,<br>언제 어디서든 이어서 볼 수 있어요</p>
        </header>

        <div class="login-btns">
            <button class="btn-log btn-goog">
                <span style="font-weight: 800; color: #ea4335;">G</span> 구글 계정으로 계속하기
            </button>
            <button class="btn-log btn-mail">
                ✉️ 이메일로 로그인
            </button>
        </div>

        <div class="profile-card">
            <div class="pc-top"></div>
            <div class="pc-avatar-proper"></div>
            <h3>테스트 러버 A</h3>
        </div>

        <div class="benefits-card">
            <h4>소중한 기록을 보관하는 방법</h4>
            <div class="b-grid">
                <div class="b-item"><div class="b-dot"></div> 안전한 기록 저장</div>
                <div class="b-item"><div class="b-dot"></div> 트리 공유 관리</div>
                <div class="b-item"><div class="b-dot"></div> 팬들 댓글 알림</div>
                <div class="b-item"><div class="b-dot"></div> 모든 기기 동기화</div>
            </div>
        </div>
    </div>
</body>
</html>
