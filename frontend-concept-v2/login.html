<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다 - Lovetree</title>
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page" data-concept-page="login">
    <div class="login-container" id="concept-main">
        <div class="login-logo">러브트리</div>
        
        <header class="login-header">
            <h1>다시, 당신의 사랑을<br>기록할 시간입니다</h1>
            <p>흩어진 순간들을 모아 하나의 나무로 완성하세요.<br>로그인하면 모든 기록이 안전하게 보관됩니다.</p>
        </header>

        <div class="login-actions">
            <!-- Google Login -->
            <a href="#" class="btn-social">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" width="20" height="20">
                구글 계정으로 시작하기
            </a>
            
            <!-- Email Login -->
            <a href="#" class="btn-social btn-brick-main">
                이메일 주소로 계속하기
            </a>
        </div>

        <!-- Benefits Recognition -->
        <section class="benefits-area">
            <h3>로그인 후의 즐거움</h3>
            <div class="benefits-grid">
                <span class="benefit-tag">기억의 영구 보존</span>
                <span class="benefit-tag">트리 동기화</span>
                <span class="benefit-tag">비밀 기록 관리</span>
                <span class="benefit-tag">따뜻한 소통</span>
            </div>
        </section>

        <!-- Back to Home -->
        <a href="home.html" class="back-subtle">나중에 기록할게요 (홈으로)</a>
    </div>

    <!-- Firebase SDK (External) - Placeholder for integration -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- Integration with existing auth logic -->
    <script src="/src/shared-utils.js"></script>
    <script src="/src/shared.js"></script>
    <script src="/src/auth.js"></script>
<script src="js/concept-state.js"></script>
</body>
</html>
