<!-- frontend-concept-v2/login.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Lovetree</title>
    <base href="/frontend-concept-v2/">
    <link rel="stylesheet" href="css/app.css?v=20260412-8">
    <link rel="stylesheet" href="css/login.css?v=20260412-8">
</head>
<body class="login-page">
    <div class="bg-decor">
        <div class="decor-tree tree-1"></div>
        <div class="decor-tree tree-2"></div>
    </div>

    <div class="login-container">
        <div class="login-logo">Lovetree</div>
        
        <header class="login-header">
            <h1>내 러브트리를 계속<br>이어가려면 로그인하세요</h1>
            <p>기록한 순간을 안전하게 저장하고,<br>다른 기기에서도 이어서 볼 수 있어요</p>
        </header>

        <div class="login-actions">
            <!-- Google Login -->
            <a href="#" class="btn-social">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" width="24" height="24">
                구글 계정으로 계속하기
            </a>
            
            <!-- Email Login -->
            <a href="#" class="btn-social btn-brick">
                <span style="font-size: 1.2rem;">✉️</span>이메일로 로그인
            </a>
        </div>

        <!-- Benefits Checklist -->
        <section class="benefits-area">
            <h3>로그인하면 이런 점이 좋아요</h3>
            <div class="benefits-grid">
                <div class="benefit-item"><span class="dot"></span>기록 영구 저장</div>
                <div class="benefit-item"><span class="dot"></span>공유 및 관리</div>
                <div class="benefit-item"><span class="dot"></span>댓글 알림</div>
                <div class="benefit-item"><span class="dot"></span>트리 동기화</div>
            </div>
        </section>

        <!-- Back to Home -->
        <div style="margin-top: 40px;">
            <a href="home.html" style="color: #aaa; text-decoration: none; font-size: 0.85rem; border-bottom: 1px solid #eee;">홈으로 돌아가기</a>
        </div>
    </div>

    <!-- Firebase SDK (External) - Placeholder for integration -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- Integration with existing auth logic -->
    <script src="/src/shared-utils.js"></script>
    <script src="/src/shared.js"></script>
    <script src="/src/auth.js"></script>
</body>
</html>
