<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>순간 추가하기 - Relovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/mobile-add-memory.css">
</head>
<body class="mam-page">
    <div class="mam-outer">
        <div class="mam-inner">
            <header class="mam-header">
                <h2>순간 추가하기</h2>
            </header>

            <div class="mam-bubble-wrap">
                <div class="mam-bubble">
                    <h3>영상 링크 붙여넣기</h3>
                    <input type="text" placeholder="YouTube, TikTok, Instagram 링크">
                </div>
            </div>

            <main class="mam-scroll">
                <div class="preview-box">
                    <span>🎞️▶️</span>
                    <p>영상 미리보기</p>
                </div>

                <div class="form-row row-horizontal">
                    <div class="form-label"><span>🗓️</span> 날짜</div>
                    <div class="val-box">2023.10.26 <span>▼</span></div>
                </div>

                <div class="form-row">
                    <div class="form-label">제목</div>
                    <input type="text" class="form-input" placeholder="짧은 제목을 입력하세요 (예: 앵콜 무대!)">
                </div>

                <div class="tags-row">
                    <div class="form-label"><span>🏷️</span> 기분 태그</div>
                    <div class="tag-pill">설렘</div>
                    <div class="tag-pill">감동</div>
                    <div class="tag-pill">행복</div>
                    <div class="tag-pill active">입덕</div>
                </div>

                <div class="form-row">
                    <div class="form-label">메모</div>
                    <textarea class="form-textarea" placeholder="이 순간의 소중한 기억을 남겨주세요..."></textarea>
                </div>

                <div class="form-row row-horizontal" style="margin-top: 10px;">
                    <div class="form-label"><span>🔗</span> 어느 순간과 연결할까요?</div>
                    <div class="val-box"><span style="width:12px; height:8px; display:inline-block; border:1.5px solid #bbb; border-radius:2px;"></span> <span>▼</span></div>
                </div>

                <button class="btn-submit">러브트리에 추가</button>
            </main>
        </div>
    </div>
</body>
</html>
