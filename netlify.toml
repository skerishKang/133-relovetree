[build]
  command = "npm run build"
  publish = "."
  env_file = ".env"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/index.js"
  to = "/src/entries/index.js"
  status = 200

[[redirects]]
  from = "/home.html"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/about.html"
  to = "/pages/about.html"
  status = 301

