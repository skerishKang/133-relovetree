<!-- frontend-concept-v2/my-trees.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 러브트리 - Lovetree</title>
<base href="/frontend-concept-v2/">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/my-trees.css">
<!-- Firebase SDK (External) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body class="home-page my-trees-page" data-concept-page="my-trees">
<div class="page-container" id="concept-main">
  <!-- Navigation -->
  <nav class="gnb">
    <div class="gnb-brand">Lovetree</div>
    <div class="nav-links">
      <a href="home.html">소개</a>
      <a href="lovetree.html">러브트리</a>
      <a href="community.html">커뮤니티</a>
      <div class="auth-box">
        <a href="my-trees.html" id="nav-auth-item" class="nav-login active">내 트리</a>
        <button id="nav-logout-btn" class="logout-minimal">로그아웃</button>
      </div>
    </div>
  </nav>

  <!-- Dashboard Header -->
  <header class="dashboard-header">
    <div>
      <h1>나의 러브트리</h1>
      <p class="dash-desc">당신이 심은 소중한 사랑의 기록들입니다.</p>
    </div>
    <a href="#" class="btn-create-tree">
      <span class="dash-btn-ico">+</span> 새 러브트리 만들기
    </a>
  </header>

  <!-- Trees Grid: Empty State Mode -->
  <section class="trees-grid" id="trees-container">
    <!-- Empty State (Shown when no trees exist) -->
    <div class="empty-state" id="empty-state">
        <div class="empty-visual">
            <div class="seed-sprout">
                <div class="sprout-leaf left"></div>
                <div class="sprout-leaf right"></div>
                <div class="sprout-stem"></div>
            </div>
        </div>
        <h2>당신의 이야기가 피어날 준비가 되었습니다</h2>
        <p>아무것도 없던 정원에<br>첫 번째 사랑의 기억을 심어보세요.</p>
        
        <div class="empty-actions">
            <a href="video-search.html" class="btn-empty-cta">첫 번째 순간 심기</a>
            
            <div class="es-tags-group">
                <span class="es-tag">#첫콘서트</span>
                <span class="es-tag">#입덕의순간</span>
                <span class="es-tag">#최애무대</span>
            </div>

            <div class="empty-helper">
                <a href="community.html">다른 팬들의 정원 둘러보기</a>
            </div>
        </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    &copy; 2026 Lovetree. 개인 아카이브 공간.
  </footer>
</div>

<!-- Core App Modules -->
<script src="/src/shared-utils.js"></script>
<script src="/src/shared.js"></script>
<script src="/src/auth.js"></script>
<script src="js/api.js"></script>

<!-- Auth Integration -->
<script>
function updateMyTreesAuthUI(user) {
  const authItem = document.getElementById('nav-auth-item');
  if (user) {
    authItem.textContent = '내 트리';
    authItem.href = 'my-trees.html';
    authItem.classList.add('active');
  } else {
  }
}
window.onAuthReady = function(user) { updateMyTreesAuthUI(user); };
setTimeout(() => { if (window.firebase && firebase.auth().currentUser) updateMyTreesAuthUI(firebase.auth().currentUser); }, 1000);
document.getElementById('nav-logout-btn').addEventListener('click', () => { if (window.signOut) window.signOut(); });
</script>
<script src="js/concept-state.js"></script>
</body>
</html>
