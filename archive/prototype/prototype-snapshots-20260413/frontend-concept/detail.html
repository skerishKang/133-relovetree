<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovetree - 메모리 상세</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/detail.css">
</head>
<body class="detail-page">
    
    <div class="detail-modal">
        <header class="modal-header">
            <button class="btn-back">←</button>
            <h2>Lovetree</h2>
            <button class="btn-more">•••</button>
        </header>

        <div class="modal-content">
            <div class="detail-video">
                <div class="play-icon"></div>
            </div>

            <div class="detail-header">
                <h3>첫 콘서트의 전율</h3>
                <p class="date">2023.11.15</p>
            </div>

            <div class="detail-tags">
                <span class="d-tag">설렘</span>
                <span class="d-tag">감동</span>
                <span class="d-tag">행복</span>
            </div>

            <div class="memo-section">
                <div class="memo-title">Memo</div>
                <p class="memo-text">
                    오늘 드디어 첫 콘서트에 갔다...!!! 현장 분위기가 정말<br>
                    대박이었고 오프닝 곡 나올 때 온몸에 소름이 쫙 돋았다.<br>
                    떼창할 때 그 전율은 평생 못 잊을 것 같다.<br>
                    너무 행복했다 ㅠㅠ 다음에 또 가고 싶다.
                </p>
                <div class="memo-icon">✍️</div>
            </div>

            <div class="connected-memories">
                <div class="cm-title">이 순간과 이어진 기억</div>
                <div class="cm-scroll">
                    <div class="cm-card">
                        <div class="cm-thumb"><div class="play-icon" style="transform: scale(0.4);"></div></div>
                        <div class="cm-info">
                            <h5>콘서트 티켓 수령</h5>
                            <p>2023.11.15</p>
                        </div>
                    </div>
                    <div class="cm-card">
                        <div class="cm-thumb" style="background:#d3c4bb;"><div class="play-icon" style="transform: scale(0.4);"></div></div>
                        <div class="cm-info">
                            <h5>굿즈 줄서기</h5>
                            <p>2023.11.15</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-actions">
            <button class="act-btn"><span style="color:#e98a8a;">❤️</span> <div class="count">125</div></button>
            <button class="act-btn"><span>💬</span> <div class="count">3</div></button>
            <button class="act-btn"><span>↗️</span> <div class="count">Share</div></button>
            <button class="act-btn"><span>✏️</span> <div class="count">Edit</div></button>
        </div>
    </div>

</body>
</html>
