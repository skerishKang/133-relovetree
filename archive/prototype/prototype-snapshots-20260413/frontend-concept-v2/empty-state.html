<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend-concept-v2/">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>환영합니다 - Lovetree</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/empty-state.css">
</head>
<body class="es-page">
    <div class="es-frame">
        <header class="es-header">
            <span class="logo-ico">Lovetree 첫걸음</span>
            <h2>당신의 이야기가<br>피어날 준비가 되었습니다</h2>
            <p>아무것도 없던 정원에<br>첫 번째 사랑의 기억을 심어보세요.</p>
        </header>

        <div class="es-visual">
            <div class="float-cards">
                <div class="f-node f1"></div>
                <div class="f-node f2"></div>
                <div class="f-node f3"></div>
            </div>
            
            <div class="seed-sprout">
                <div class="sprout-leaf left"></div>
                <div class="sprout-leaf right"></div>
                <div class="sprout-stem"></div>
            </div>
            <div class="es-plant-pot"></div>
        </div>

        <button class="btn-start" onclick="location.href='video-search.html'">첫 번째 순간 심기</button>

        <div class="es-tags">
            <span class="es-tag">#첫콘서트</span>
            <span class="es-tag">#입덕의순간</span>
            <span class="es-tag">#최애무대</span>
        </div>
    </div>
</body>
</html>
