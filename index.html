<!-- index.html - Main Home -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovetree - 사랑을 기록하고 잇는 공간</title>
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/index-hero.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/index-sections.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/index-responsive.css?v=20260414_v3">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
</head>
<body class="home-v2-active" data-page="home">
    <div class="page-wrapper">
        <!-- Hardcoded nav removed - now injected by shared-layout.js -->

    <!-- Hero Section -->
    <section class="hero-v2">
        <div class="shell hero-inner" style="display: flex; align-items: center; gap: 40px; padding: 40px 0;">
            <div class="hero-left" style="flex: 1;">
                <h1>사랑에 빠진<br>모든 순간을<br>연결하세요</h1>
                <p>
                    영상, 날짜, 감정, 메모가 아름답게 이어져<br>
                    당신만의 러브트리가 자라납니다
                </p>
                <div class="hero-btns">
                    <a href="/pages/login.html" class="btn-main">러브트리 시작하기</a>
                    <a href="/pages/community.html" class="btn-sub">다른 트리 보기</a>
                </div>
            </div>

            <div class="hero-right" style="flex: 1.2; position: relative; height: 420px;">
                <div class="tree-container" style="position: relative; width: 100%; height: 100%;">
                    <!-- Organic Branch SVG -->
                    <svg class="tree-svg" viewBox="0 0 600 500" preserveAspectRatio="none" style="position: absolute; width: 100%; height: 100%;">
                        <path d="M500,500 C480,400 520,300 480,0" stroke="#ebdcd0" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6" />
                        <path d="M495,350 Q400,320 65,185" stroke="#ebdcd0" stroke-width="2" fill="none" opacity="0.8" />
                        <path d="M490,250 Q350,200 225,115" stroke="#ebdcd0" stroke-width="2" fill="none" opacity="0.8" />
                        <path d="M490,280 Q350,280 245,285" stroke="#ebdcd0" stroke-width="2" fill="none" opacity="0.8" />
                        <path d="M485,150 Q420,100 405,80" stroke="#ebdcd0" stroke-width="2" fill="none" opacity="0.8" />
                        <path d="M485,220 Q440,240 425,245" stroke="#ebdcd0" stroke-width="2" fill="none" opacity="0.8" />
                    </svg>

                    <!-- Memory Nodes -->
                    <div class="memory-node n1"><div class="node-thumb"><img src="/docs/image/slide/home-slide-01-empty-tree_bts.png" alt="Mem" class="is-blurred"><div class="play-ico">▶</div></div><div class="node-meta">2023.03.08 <span class="badge-memo">심쿵</span></div></div>
                    <div class="memory-node n2"><div class="node-thumb"><img src="/docs/image/slide/home-slide-02-first-memory_bts.png" alt="Mem"><div class="play-ico">▶</div></div><div class="node-meta">2023.09.20 <span class="badge-memo">심쿵</span></div></div>
                    <div class="memory-node n3"><div class="node-thumb"><img src="/docs/image/slide/slide1.png" alt="Mem"><div class="play-ico">▶</div></div><div class="node-meta">2023.06.17 <span class="badge-memo">감동</span></div></div>
                    <div class="memory-node n4"><div class="node-thumb"><img src="/docs/image/slide/slide2.png" alt="Mem"><div class="play-ico">▶</div></div><div class="node-meta">2023.08.10 <span class="badge-memo">기록</span></div></div>
                    <div class="memory-node n5"><div class="node-thumb"><img src="/docs/image/slide/Gemini_Generated_Image_z8g408z8g408z8g4.png" alt="Mem"><div class="play-ico">▶</div></div><div class="node-meta">2023.01.07 <span class="badge-memo">기억</span></div></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bottom Features (Universal Grid) -->
    <section class="features-v2">
        <div class="shell feat-grid">
            <div class="feat-card">
                <div class="feat-icon">📸</div>
                <h3>순간 포착</h3>
                <p>좋아하게 된 장면을<br>영상과 함께 남깁니다</p>
            </div>
            <div class="feat-card">
                <div class="feat-icon">🔗</div>
                <h3>경로 연결</h3>
                <p>날짜와 감정이 이어져<br>하나의 흐름이 됩니다</p>
            </div>
            <div class="feat-card">
                <div class="feat-icon">🌱</div>
                <h3>트리 완성</h3>
                <p>기록이 모여 당신만의<br>러브트리가 자랍니다</p>
            </div>
            <div class="feat-card">
                <div class="feat-icon">📢</div>
                <h3>공유하기</h3>
                <p>완성된 트리를 다른<br>팬과 나눌 수 있습니다</p>
            </div>
        </div>
    </section>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="/src/runtime-config.js?v=20260414_v3"></script>
    <script src="/src/shared-utils.js?v=20260414_v3"></script>
    <script src="/src/shared-layout.js?v=20260414_v3"></script>
    <script src="/src/shared.js?v=20260414_v3"></script>
    <script src="/src/postgres-client-browser.js?v=20260414_v3"></script>
    <script src="/src/auth.js?v=20260414_v3"></script>
    <script src="/src/concept-state.js?v=20260414_v3"></script>

    <script>
        // Inject shared GNB
        if (window.sharedLayout && window.sharedLayout.ensureGlobalLayoutInjected) {
            window.sharedLayout.ensureGlobalLayoutInjected();
        }

        // Auth State Integration (Common)
        // index.html has no nav-logout-btn, so skip logout binding
        if (window.initStandardAuthUI) window.initStandardAuthUI({
            skipLogoutBinding: true
        });

        // Simple entry animation
        document.querySelectorAll('.memory-node').forEach((el, idx) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            setTimeout(() => {
                el.style.transition = 'all 0.6s ease';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 300 + (idx * 150));
        });
    </script>
</body>
</html>
