<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovetree - 설정</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body class="settings-page">
    
    <div class="settings-modal">
        <header class="s-header">
            <button class="btn-s-back">←</button>
            <h2>공개 범위 설정</h2>
        </header>

        <div class="s-content">
            <div class="privacy-opts">
                <div class="opt-card active">
                    <div class="opt-icon">👤🔒</div>
                    <div class="opt-text">
                        <h4>나만 보기</h4>
                        <p>본인만 LoveTree를 볼 수 있습니다.</p>
                    </div>
                    <div class="radio-cir"></div>
                </div>

                <div class="opt-card">
                    <div class="opt-icon">🔗</div>
                    <div class="opt-text">
                        <h4>링크를 가진 사람만</h4>
                        <p>링크를 알고 있는 사람에게만<br>LoveTree가 공개됩니다.</p>
                    </div>
                    <div class="radio-cir"></div>
                    <button class="copy-link-btn">Copy Link</button>
                </div>

                <div class="opt-card">
                    <div class="opt-icon">🌐</div>
                    <div class="opt-text">
                        <h4>커뮤니티에 공개</h4>
                        <p>모든 Lovetree 사용자가 커뮤니티에서<br>LoveTree를 검색하고 볼 수 있습니다.</p>
                    </div>
                    <div class="radio-cir"></div>
                </div>
            </div>

            <div class="toggle-list">
                <div class="t-item">
                    <div class="t-text">
                        <h5>댓글 허용</h5>
                        <p>내 LoveTree에 다른 사용자가 댓글을 남길<br>수 있습니다.</p>
                    </div>
                    <div class="s-switch on"></div>
                </div>
                
                <div class="t-item">
                    <div class="t-text">
                        <h5>좋아요 허용</h5>
                        <p>내 LoveTree에 좋아요 표현을 받을 수<br>있습니다.</p>
                    </div>
                    <div class="s-switch on"></div>
                </div>

                <div class="t-item">
                    <div class="t-text">
                        <h5>프로필 표시 이름 공개</h5>
                        <p>LoveTree 옆에 내 프로필 표기 이름을<br>공개합니다.</p>
                    </div>
                    <div class="s-switch on"></div>
                </div>
            </div>

            <button class="btn-save">저장</button>
        </div>
    </div>

</body>
</html>
