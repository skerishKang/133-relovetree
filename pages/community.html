<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>Discovery Square - Lovetree</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS Unified Design System V3 -->
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v16">
    <link rel="stylesheet" href="/assets/css/app-nav.css?v=20260414_v16">
    <link rel="stylesheet" href="/assets/css/app-utils.css?v=20260414_v16">
    <link rel="stylesheet" href="/assets/css/app-modal.css?v=20260414_v16">
    <link rel="stylesheet" href="/assets/css/community-layout.css?v=20260414_v16">
    <link rel="stylesheet" href="/assets/css/community-cards.css?v=20260414_v16">
    
</head>
<body class="comm-page" data-page="community">
    <!-- Hardcoded nav removed - now injected by shared-layout.js -->

    <main class="shell comm-main">
        <!-- Discovery Hero Area (Screenshot 3 Alignment) -->
        <div class="discovery-hero">
            <div class="hero-inner">
                <h1>다른 팬들의 러브트리 구경하기</h1>
                
                <!-- Search Area -->
                <div class="search-area">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="comm-search-input" placeholder="팬심 가득한 러브트리 검색..." 
                               style="background: transparent; border: none; outline: none; width: 100%; font-family: inherit; font-size: 0.95rem; font-weight: 600;">
                    </div>
                </div>
                
                <!-- Filter Area -->
                <div class="filter-area">
                    <button class="f-btn active">인기</button>
                    <button class="f-btn">최신</button>
                    <button class="f-btn">입덕</button>
                    <button class="f-btn">콘서트</button>
                    <button class="f-btn">직캠</button>
                    <button class="f-btn">컴백</button>
                </div>
            </div>
        </div>

        <div id="discovery-grid" class="discovery-grid">
            <!-- Static Featured Placeholder (Immediate visual feedback like Screenshot 3) -->
            <div class="featured-vertical" id="featured-placeholder">
                <div class="fv-badge">Featured LoveTree</div>
                <div class="fv-tree-canvas">
                    <svg viewBox="0 0 100 200">
                        <path d="M50,190 L50,100" stroke="#b56e6e" stroke-width="2" fill="none" />
                        <path d="M50,150 Q70,130 80,100" stroke="#b56e6e" stroke-width="1.5" fill="none" />
                        <path d="M50,130 Q30,110 20,80" stroke="#b56e6e" stroke-width="1.5" fill="none" />
                        <circle cx="80" cy="100" r="4" fill="#64b56e" />
                        <circle cx="20" cy="80" r="4" fill="#e11d48" />
                        <circle cx="50" cy="100" r="5" fill="#f59e0b" />
                    </svg>
                </div>
                <div class="fv-content">
                    <h3>추천 러브트리</h3>
                    <div class="fv-author">@익명의 팬</div>
                    <div class="fv-view-btn">연결된 트리 전체 보기</div>
                </div>
            </div>

            <!-- Skeleton / Initial Empty Cards for layout stability -->
            <div id="initial-loading-msg" style="grid-column: 1 / -1; text-align: center; padding: 40px 0; font-weight: 800; color: #b56e6e;">
                광장의 이야기를 불러오는 중...
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="/src/runtime-config.js?v=20260414_v16"></script>
    <script src="/src/shared-utils.js?v=20260414_v16"></script>
    <script src="/src/shared-layout.js?v=20260414_v16"></script>
    <script src="/src/shared.js?v=20260414_v16"></script>
    <script src="/src/auth.js?v=20260414_v16"></script>
    <script src="/src/api.js?v=20260414_v16"></script>
    <script src="/src/flow-shared.js?v=20260414_v16"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            if (window.initStandardAuthUI) window.initStandardAuthUI();
            
            const grid = document.getElementById('discovery-grid');
            const loadingMsg = document.getElementById('initial-loading-msg');
            const searchInput = document.getElementById('comm-search-input');
            const featuredPlaceholder = document.getElementById('featured-placeholder');
            
            let allPublicTrees = [];
            
            try {
                // Fetch public trees from global API
                allPublicTrees = await window.fetchPublicTrees({ limit: 40 });
                
                if (loadingMsg) loadingMsg.style.display = 'none';

                if (!allPublicTrees || allPublicTrees.length === 0) {
                    renderEmptyPlaza();
                    return;
                }

                renderPlaza(allPublicTrees);

            } catch (err) {
                console.error('Plaza load error:', err);
                if (loadingMsg) loadingMsg.textContent = "연결이 잠시 원활하지 않습니다. 잠시 후 다시 조율해 주세요.";
            }

            // Unified Search Logic
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase().trim();
                    const filtered = allPublicTrees.filter(t => 
                        (t.name && t.name.toLowerCase().includes(query)) || 
                        (t.authorName && t.authorName.toLowerCase().includes(query)) ||
                        (t.authorDisplayName && t.authorDisplayName.toLowerCase().includes(query))
                    );
                    renderPlaza(filtered, query !== '');
                });
            }

            function renderEmptyPlaza() {
                // Keep the grid shell but show an empty state inside (excluding featured)
                const emptyMsg = document.createElement('div');
                emptyMsg.style.cssText = 'grid-column: 1 / -1; text-align: center; padding: 60px 0; color: #64748b; font-weight: 700;';
                emptyMsg.innerHTML = '🔍 아직 광장이 평온하네요. 당신의 기록을 첫 번째로 심어보시겠어요?';
                grid.appendChild(emptyMsg);
            }

            function renderPlaza(trees, isFiltering = false) {
                // Clear existing cards EXCEPT the featured-placeholder if first load
                // Or clear everything to re-render during search
                grid.innerHTML = '';
                
                if (trees.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 100px 0; color: #64748b; font-weight:700;">검색 결과가 없습니다. 다른 이름으로 찾아보시겠어요? 🔍</div>';
                    return;
                }

                let html = '';
                
                if (isFiltering) {
                    // During search, just show regular cards in order
                    trees.forEach(tree => html += renderCard(tree));
                } else {
                    // Normal view: Featured (Actual data) + others
                    const featured = trees[0];
                    const others = trees.slice(1);
                    
                    // Show 2 cards before the featured vertical span (column 1, 2)
                    others.slice(0, 2).forEach(tree => html += renderCard(tree));
                    
                    // Show actual featured data in column 3 (Vertical Span)
                    html += renderFeaturedVertical(featured);
                    
                    // Show rest of the cards
                    others.slice(2).forEach(tree => html += renderCard(tree));
                }

                grid.innerHTML = html;
            }

            function renderCard(tree) {
                const treeId = tree.id || tree._id;
                const author = tree.authorName || tree.authorDisplayName || '익명의 팬';
                const nodeCount = (tree.nodes || []).length;
                const thumb = (tree.nodes && tree.nodes[0] && tree.nodes[0].videoId) 
                    ? `https://img.youtube.com/vi/${tree.nodes[0].videoId}/mqdefault.jpg` 
                    : 'https://images.unsplash.com/photo-1542332213-31f87348057f?q=80&w=400&auto=format&fit=crop';
                
                return `
                    <a href="/pages/community-tree-detail.html?treeId=${encodeURIComponent(treeId)}" class="disc-card">
                        <div class="dc-media"><img src="${thumb}" alt=""></div>
                        <div class="dc-info">
                            <h3>${escapeHtml(tree.name || '나의 러브트리')}</h3>
                            <div class="dc-auth"><span>@${escapeHtml(author)}</span></div>
                            <div class="dc-footer">
                                <div class="dc-tags"><span class="dc-tag">#감동</span></div>
                                <div class="dc-stats"><span>🌱 ${nodeCount}</span></div>
                            </div>
                        </div>
                    </a>
                `;
            }

            function renderFeaturedVertical(tree) {
                const treeId = tree.id || tree._id;
                const author = tree.authorName || tree.authorDisplayName || '익명의 팬';
                const treeTypeHtml = (tree.nodes && tree.nodes.length > 5) ? '<circle cx="50" cy="50" r="10" fill="#e11d48"/>' : '';
                
                return `
                    <div class="featured-vertical" style="cursor: pointer;" onclick="location.href='/pages/community-tree-detail.html?treeId=${encodeURIComponent(treeId)}'">
                        <div class="fv-badge">Featured LoveTree</div>
                        <div class="fv-tree-canvas">
                            <svg viewBox="0 0 100 200">
                                <path d="M50,190 L50,100" stroke="#b56e6e" stroke-width="2" fill="none" />
                                <path d="M50,150 Q70,130 80,100" stroke="#b56e6e" stroke-width="1.5" fill="none" />
                                <path d="M50,130 Q30,110 20,80" stroke="#b56e6e" stroke-width="1.5" fill="none" />
                                <circle cx="80" cy="100" r="4" fill="#64b56e" />
                                <circle cx="20" cy="80" r="4" fill="#e11d48" />
                                <circle cx="50" cy="100" r="5" fill="#f59e0b" />
                                ${treeTypeHtml}
                            </svg>
                        </div>
                        <div class="fv-content">
                            <h3>${escapeHtml(tree.name || '추천 러브트리')}</h3>
                            <div class="fv-author">@${escapeHtml(author)}</div>
                            <div class="fv-view-btn">연결된 트리 전체 보기</div>
                        </div>
                    </div>
                `;
            }

            function escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        });
    </script>
</body>
</html>
