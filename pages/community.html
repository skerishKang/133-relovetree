<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>Discovery Square - Lovetree</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS Unified Design System V3 -->
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v15_absolute_zero">
    <link rel="stylesheet" href="/assets/css/app-nav.css?v=20260414_v15_absolute_zero">
    <link rel="stylesheet" href="/assets/css/app-utils.css?v=20260414_v15_absolute_zero">
    <link rel="stylesheet" href="/assets/css/app-modal.css?v=20260414_v15_absolute_zero">
    <link rel="stylesheet" href="/assets/css/community-layout.css?v=20260414_v15_absolute_zero">
    <link rel="stylesheet" href="/assets/css/community-cards.css?v=20260414_v15_absolute_zero">
    
    <!-- Layout Guardian V15: Absolute Zero Sync -->
    <script>
        (function() {
            const v = "V15_ABSOLUTE_ZERO_20260414";
            console.log("[Lovetree] HTML Version: " + v);
            const purge = () => {
                const legacy = document.querySelectorAll('.top-nav, .header, #header, .gnb:not([data-global-header="1"]), nav:not([data-global-header="1"]), .brand-link, .brand-title');
                legacy.forEach(el => el.remove());
            };
            purge();
            if (window.MutationObserver) {
                const observer = new MutationObserver(purge);
                observer.observe(document.documentElement, { childList: true, subtree: true });
                setTimeout(() => observer.disconnect(), 5000);
            }
        })();
    </script>
</head>
<body class="comm-page" data-page="community">
    <!-- Hardcoded nav removed - now injected by shared-layout.js -->

    <main class="shell comm-main">
        <div style="text-align: center; margin: 40px 0 60px;">
            <h1 style="font-size: 2.2rem; font-weight: 900; color: #2c1a1a;">"다른 팬들의 러브트리 구경하기"</h1>
            
            <!-- Search Box (moved from GNB) -->
            <div class="search-box" style="max-width: 400px; margin: 24px auto 0;">
                <span class="search-icon">🔍</span>
                <span class="search-placeholder">팬심 가득한 러브트리 검색...</span>
            </div>
            
            <div class="filter-area" style="justify-content: center; margin-top: 24px;">
                <button class="f-btn active">인기</button>
                <button class="f-btn">최신</button>
                <button class="f-btn">입덕</button>
                <button class="f-btn">콘서트</button>
                <button class="f-btn">직캠</button>
                <button class="f-btn">컴백</button>
            </div>
        </div>

        <div id="discovery-grid" class="discovery-grid">
            <!-- Rendered by JS -->
            <div id="loading-plaza" style="grid-column: 1 / -1; text-align: center; padding: 100px 0;">
                <p style="font-weight: 800; color: #b56e6e;">광장의 이야기를 불러오는 중...</p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="/src/runtime-config.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared-utils.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared-layout.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/auth.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/api.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/flow-shared.js?v=20260414_v15_absolute_zero"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            if (window.initStandardAuthUI) window.initStandardAuthUI();
            
            const grid = document.getElementById('discovery-grid');
            const loading = document.getElementById('loading-plaza');
            const searchBox = document.querySelector('.search-box');
            
            let allPublicTrees = [];
            
            try {
                allPublicTrees = await window.fetchPublicTrees({ limit: 20 });
                if (!allPublicTrees || allPublicTrees.length === 0) {
                    loading.textContent = "아직 광장이 평온하네요. 당신의 기록을 첫 번째로 심어보시겠어요?";
                    return;
                }

                renderPlaza(allPublicTrees);

            } catch (err) {
                console.error('Plaza load error:', err);
                loading.textContent = "연결이 잠시 원활하지 않습니다. 잠시 후 다시 조율해 주세요.";
            }

            // Search Logic
            if (searchBox) {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = '팬심 가득한 러브트리 검색...';
                input.className = 'search-input-hidden'; // Style this in CSS or inline
                input.style.cssText = 'background:transparent; border:none; outline:none; width:100%; font-family:inherit; font-size:0.9rem; margin-left:10px;';
                
                const placeholder = searchBox.querySelector('.search-placeholder');
                searchBox.appendChild(input);
                if (placeholder) placeholder.style.display = 'none';

                input.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase().trim();
                    const filtered = allPublicTrees.filter(t => 
                        (t.name && t.name.toLowerCase().includes(query)) || 
                        (t.authorName && t.authorName.toLowerCase().includes(query)) ||
                        (t.authorDisplayName && t.authorDisplayName.toLowerCase().includes(query))
                    );
                    renderPlaza(filtered, query !== '');
                });
            }

            function renderPlaza(trees, isFiltering = false) {
                if (loading) loading.remove();
                
                if (trees.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 100px 0; color: #64748b;">검색 결과가 없습니다. 다른 이름으로 찾아보시겠어요? 🔍</div>';
                    return;
                }

                let html = '';
                
                if (isFiltering) {
                    // During search, just show regular cards
                    trees.forEach(tree => html += renderCard(tree));
                } else {
                    // Normal view: Featured + others
                    const featured = trees[0];
                    const others = trees.slice(1);
                    others.slice(0, 2).forEach(tree => html += renderCard(tree));
                    html += renderFeaturedVertical(featured);
                    others.slice(2).forEach(tree => html += renderCard(tree));
                }

                grid.innerHTML = html;
            }

            function renderCard(tree) {
                const treeId = tree.id || tree._id;
                const author = tree.authorName || tree.authorDisplayName || '익명의 팬';
                const nodeCount = (tree.nodes || []).length;
                const thumb = (tree.nodes && tree.nodes[0] && tree.nodes[0].videoId) 
                    ? `https://img.youtube.com/vi/${tree.nodes[0].videoId}/mqdefault.jpg` 
                    : 'https://images.unsplash.com/photo-1542332213-31f87348057f?q=80&w=400&auto=format&fit=crop';
                
                return `
                    <a href="/pages/community-tree-detail.html?treeId=${encodeURIComponent(treeId)}" class="disc-card">
                        <div class="dc-media"><img src="${thumb}" alt=""></div>
                        <div class="dc-info">
                            <h3>${escapeHtml(tree.name || '나의 러브트리')}</h3>
                            <div class="dc-auth"><span>@${escapeHtml(author)}</span></div>
                            <div class="dc-footer">
                                <div class="dc-tags"><span class="dc-tag">#감동</span></div>
                                <div class="dc-stats"><span>🌱 ${nodeCount}</span></div>
                            </div>
                        </div>
                    </a>
                `;
            }

            function renderFeaturedVertical(tree) {
                const treeId = tree.id || tree._id;
                const author = tree.authorName || tree.authorDisplayName || '익명의 팬';
                return `
                    <div class="featured-vertical">
                        <div class="fv-badge">Featured LoveTree</div>
                        <div class="fv-tree-canvas" style="cursor: pointer;" onclick="location.href='/pages/community-tree-detail.html?treeId=${encodeURIComponent(treeId)}'">
                            <svg viewBox="0 0 100 200">
                                <path d="M50,190 L50,100" stroke="#b56e6e" stroke-width="2" fill="none" />
                                <path d="M50,150 Q70,130 80,100" stroke="#b56e6e" stroke-width="1.5" fill="none" />
                                <path d="M50,130 Q30,110 20,80" stroke="#b56e6e" stroke-width="1.5" fill="none" />
                                <circle cx="80" cy="100" r="4" fill="#64b56e" />
                                <circle cx="20" cy="80" r="4" fill="#e11d48" />
                                <circle cx="50" cy="100" r="5" fill="#f59e0b" />
                            </svg>
                        </div>
                        <div class="fv-content">
                            <h3>${escapeHtml(tree.name || '추천 러브트리')}</h3>
                            <div class="fv-author">@${escapeHtml(author)}</div>
                            <div class="fv-view-btn" onclick="location.href='/pages/community-tree-detail.html?treeId=${encodeURIComponent(treeId)}'">연결된 트리 전체 보기</div>
                        </div>
                    </div>
                `;
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        });
    </script>
</body>
</html>
