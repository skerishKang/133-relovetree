<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>커뮤니티 광장 - Lovetree</title>
    <!-- CSS Standardized V3 -->
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/index-hero.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/community-layout.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/community-cards.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/index-responsive.css?v=20260414_v3">
</head>
<body class="comm-page">
    <!-- Standard Navigation with alignment shell -->
    <nav class="gnb-v2">
        <div class="gnb-inner shell">
            <a href="/" class="gnb-logo">Lovetree</a>
            <div class="gnb-links">
                <a href="/pages/lovetree.html">러브트리</a>
                <a href="/pages/community.html" class="active">커뮤니티</a>
                <a href="/pages/login.html" class="btn-pill-auth" id="gnb-login-link">로그인</a>
            </div>
        </div>
    </nav>

    <!-- Discovery Square Hero Section -->
    <header class="discovery-hero">
        <div class="shell hero-inner">
            <div class="hero-badge">Discovery Square</div>
            <h1>당신의 사랑이<br>숲이 되는 광장</h1>
            <p>다른 팬들이 정성껏 키워낸 러브트리를 만나보세요</p>
            
            <div class="search-area">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <span class="search-placeholder">어떤 팬의 사랑 경로를 발견해볼까요?</span>
                </div>
            </div>

            <div class="filter-area">
                <button class="f-btn active">인기순</button>
                <button class="f-btn">최신순</button>
                <button class="f-btn">입덕 스토리</button>
            </div>
        </div>
    </header>

    <main class="shell comm-main" style="padding: 40px 0;">
        <!-- Spotlight Area -->
        <div id="featured-spotlight" class="featured-spotlight-area" style="display: none;">
             <!-- Renders via JS -->
        </div>

        <!-- Static Mockup for immediate UI -->
        <div id="loading-placeholder" class="discovery-grid active" style="margin-bottom: 40px;">
             <!-- Static mock cards will follow theme -->
             <div class="comm-status state-loading" id="init-loader">
                <div class="loading-spinner"></div>
                <p>소중한 기록들을 불러오는 중입니다</p>
             </div>
        </div>

        <div id="community-error" class="comm-status comm-error" style="display: none;">
            <div class="error-icon">⚠️</div>
            <h3>잠시 연결이 원활하지 않습니다</h3>
            <p id="community-error-msg">잠시 후 다시 시도해주세요</p>
            <button id="btn-retry-community" class="btn-retry">다시 시도하기</button>
        </div>

        <div id="community-empty" class="comm-status comm-empty" style="display: none;">
            <div class="empty-icon">🌱</div>
            <h3>아직 광장이 평온하네요</h3>
            <p>당신의 첫 번째 러브트리를 가장 먼저 심어보시겠어요</p>
            <a href="/pages/login.html" class="btn-start">러브트리 시작하기</a>
        </div>

        <div id="discovery-grid" class="discovery-grid"></div>
    </main>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="/src/runtime-config.js"></script>
    <script src="/src/shared-utils.js"></script>
    <script src="/src/shared.js"></script>
    <script src="/src/postgres-client-browser.js"></script>
    <script src="/src/flow-shared.js"></script>
    <script src="/src/auth.js"></script>
    
    <script>
    (function() {
      var currentSort = 'popular';
      function renderPublicTrees(trees) {
        var loader = document.getElementById('init-loader');
        if (loader) loader.style.display = 'none';
        
        var grid = document.getElementById('discovery-grid');
        grid.innerHTML = '';
        if (!trees || trees.length === 0) { document.getElementById('community-empty').style.display = 'block'; return; }
        
        trees.forEach(function(tree) {
          var thumb = (tree.nodes && tree.nodes.length > 0 && tree.nodes[0].videoId) 
                      ? 'https://img.youtube.com/vi/' + tree.nodes[0].videoId + '/hqdefault.jpg' 
                      : 'https://images.unsplash.com/photo-1542332213-31f87348057f?q=80&w=400&auto=format&fit=crop';
          
          var card = document.createElement('a');
          card.href = '/pages/lovetree.html'; // Temporary link
          card.className = 'disc-card';
          card.innerHTML = '<div class="dc-media"><img src="'+thumb+'" onload="this.classList.add(\'loaded\')"></div>' +
                           '<div class="dc-info"><h3>'+(tree.name || '이름 없는 트리')+'</h3>' +
                           '<div class="dc-auth"><span>@Author</span></div>' +
                           '<div class="dc-stats"><span>❤️ '+(tree.likeCount||0)+'</span></div></div>';
          grid.appendChild(card);
        });
        grid.style.display = 'grid';
      }
      
      document.addEventListener('DOMContentLoaded', function() {
        if (typeof window.FlowShared !== 'undefined') {
            window.FlowShared.loadPublicTrees(currentSort).then(renderPublicTrees).catch(function(){
                document.getElementById('community-error').style.display='block';
            });
        }
        if (window.initStandardAuthUI) window.initStandardAuthUI();
      });
    })();
    </script>
</body>
</html>
