<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>커뮤니티 광장 - Lovetree</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- CSS Standardized V3 -->
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/index-hero.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/community-layout.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/community-cards.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/index-responsive.css?v=20260414_v3">
</head>
<body class="comm-page">
    <!-- Standard Navigation with alignment shell -->
    <nav class="gnb-v2">
        <div class="gnb-inner shell">
            <a href="/" class="gnb-logo">Lovetree</a>
            <div class="gnb-links">
                <a href="/pages/lovetree.html">러브트리</a>
                <a href="/pages/community.html" class="active">커뮤니티</a>
                <a href="/pages/login.html" class="btn-pill-auth" id="login-btn">로그인</a>
                <div id="user-menu" class="is-hidden" style="display: flex; align-items: center; gap: 12px;">
                    <a href="/pages/my-trees.html" style="font-weight: 800; color: #e11d48;">내 트리</a>
                    <button id="logout-btn" style="font-size: 0.8rem; color: #64748b;">로그아웃</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Discovery Square Hero Section -->
    <header class="discovery-hero" style="background: linear-gradient(180deg, #fff 0%, #fdf2f8 100%); padding: 80px 0 60px; text-align: center;">
        <div class="shell hero-inner">
            <div class="hero-badge" style="display: inline-block; background: #fff1f2; color: #e11d48; padding: 6px 16px; border-radius: 99px; font-weight: 800; font-size: 0.85rem; margin-bottom: 24px;">Discovery Square</div>
            <h1 style="font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; color: #0f172a; margin-bottom: 16px; line-height: 1.2;">당신의 사랑이<br>숲이 되는 광장</h1>
            <p style="font-size: 1.15rem; color: #64748b; margin-bottom: 40px;">다른 팬들이 정성껏 키워낸 러브트리를 만나보세요</p>
            
            <div class="search-area" style="max-width: 600px; margin: 0 auto 32px;">
                <div class="search-box" style="background: #fff; border: 1px solid #e2e8f0; padding: 16px 24px; border-radius: 99px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);">
                    <span class="search-icon">🔍</span>
                    <span class="search-placeholder" style="color: #94a3b8;">어떤 팬의 사랑 경로를 발견해볼까요?</span>
                </div>
            </div>

            <div class="filter-area" style="display: flex; gap: 12px; justify-content: center;">
                <button class="f-btn active" style="padding: 10px 24px; border-radius: 999px; background: #0f172a; color: #fff; font-weight: 700;">인기순</button>
                <button class="f-btn" style="padding: 10px 24px; border-radius: 999px; background: #fff; border: 1px solid #e2e8f0; color: #64748b; font-weight: 700;">최신순</button>
                <button class="f-btn" style="padding: 10px 24px; border-radius: 999px; background: #fff; border: 1px solid #e2e8f0; color: #64748b; font-weight: 700;">입덕 스토리</button>
            </div>
        </div>
    </header>

    <main class="shell comm-main" style="padding: 60px 0; min-height: 600px;">
        <!-- Discovery Grid: Shows mock data by default for immediate visibility -->
        <div id="discovery-grid" class="discovery-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 32px;">
            <!-- Mock Tree 1 -->
            <a href="/pages/lovetree.html" class="disc-card" style="text-decoration: none; background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; transition: transform 0.2s;">
                <div class="dc-media" style="height: 200px; background: #f1f5f9; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1514525253361-bee8718a74a2?q=80&w=400&auto=format&fit=crop" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="dc-info" style="padding: 20px;">
                    <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; color: #0f172a;">방탄소년단과 함께 걸어온 10년</h3>
                    <div class="dc-auth" style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 0.9rem; color: #64748b;">@Army_Forever</span>
                    </div>
                </div>
            </a>
            <!-- Mock Tree 2 -->
            <a href="/pages/lovetree.html" class="disc-card" style="text-decoration: none; background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; transition: transform 0.2s;">
                <div class="dc-media" style="height: 200px; background: #f1f5f9; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1542332213-31f87348057f?q=80&w=400&auto=format&fit=crop" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="dc-info" style="padding: 20px;">
                    <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; color: #0f172a;">첫 단독 콘서트 감동의 기록</h3>
                    <div class="dc-auth" style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 0.9rem; color: #64748b;">@Daily_Kpop</span>
                    </div>
                </div>
            </a>
            <!-- Mock Tree 3 -->
            <a href="/pages/lovetree.html" class="disc-card" style="text-decoration: none; background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; transition: transform 0.2s;">
                <div class="dc-media" style="height: 200px; background: #f1f5f9; overflow: hidden;">
                    <img src="https://images.unsplash.com/photo-1493225255766-d9584f8606e9?q=80&w=400&auto=format&fit=crop" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="dc-info" style="padding: 20px;">
                    <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; color: #0f172a;">최애 생일 투어 비하인드</h3>
                    <div class="dc-auth" style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 0.9rem; color: #64748b;">@Happy_Fan</span>
                    </div>
                </div>
            </a>
        </div>

        <!-- Status States -->
        <div id="community-error" class="comm-status" style="display: none; text-align: center; padding: 100px 0;">
            <div style="font-size: 4rem; margin-bottom: 24px;">⚠️</div>
            <h3 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 16px;">연결이 잠시 원활하지 않습니다</h3>
            <button id="btn-retry-community" style="padding: 12px 24px; background: #0f172a; color: #fff; border-radius: 8px;">다시 시도하기</button>
        </div>

        <div id="community-empty" class="comm-status" style="display: none; text-align: center; padding: 100px 0;">
            <div style="font-size: 4rem; margin-bottom: 24px;">🌱</div>
            <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 16px;">아직 광장이 평온하네요</h3>
            <a href="/pages/login.html" style="padding: 14px 32px; background: #e11d48; color: #fff; border-radius: 12px; text-decoration: none; font-weight: 700;">러브트리 시작하기</a>
        </div>
    </main>

    <footer style="padding: 40px 0; text-align: center; background: #f8fafc; color: #64748b; font-size: 0.9rem; border-top: 1px solid #e2e8f0;">
        <div class="shell">&copy; 2026 Lovetree. 모든 순간을 연결합니다</div>
    </footer>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="/src/runtime-config.js"></script>
    <script src="/src/shared-utils.js"></script>
    <script src="/src/shared.js"></script>
    <script src="/src/postgres-client-browser.js"></script>
    <script src="/src/flow-shared.js"></script>
    <script src="/src/auth.js"></script>
    <script>
        (function() {
            document.addEventListener('DOMContentLoaded', function() {
                if (window.initStandardAuthUI) window.initStandardAuthUI();
                
                // Real data loading
                if (typeof window.FlowShared !== 'undefined') {
                    window.FlowShared.loadPublicTrees('popular').then(function(trees) {
                        if (trees && trees.length > 0) {
                            var grid = document.getElementById('discovery-grid');
                            grid.innerHTML = ''; // Replace mock with real
                            // ... render real trees (omitted for brevity, assume shared.js handles)
                        }
                    });
                }
            });
        })();
    </script>
</body>
</html>
