<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다 - Lovetree</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v15_absolute_zero">
    <link rel="stylesheet" href="/assets/css/login-v3.css?v=20260414_v15_absolute_zero">

    <!-- Layout Guardian V15: Absolute Zero Sync -->
    <script>
        (function() {
            const v = "V15_ABSOLUTE_ZERO_20260414";
            console.log("[Lovetree] HTML Version: " + v);
            const purge = () => {
                const legacy = document.querySelectorAll('.top-nav, .header, #header, .gnb:not([data-global-header="1"]), nav:not([data-global-header="1"]), .brand-link, .brand-title');
                legacy.forEach(el => el.remove());
            };
            purge();
            if (window.MutationObserver) {
                const observer = new MutationObserver(purge);
                observer.observe(document.documentElement, { childList: true, subtree: true });
                setTimeout(() => observer.disconnect(), 5000);
            }
        })();
    </script>
</head>
<body class="login-page" data-page="login">
    <div class="page-wrapper">
        <div class="login-shell">
            <div class="login-card">
                <div class="login-stack-sm">
                    <h1>다시, 당신의 사랑을<br>기록할 시간입니다</h1>
                    <p class="login-muted">흩어진 순간들을 모아 하나의 나무로 완성하세요<br>로그인하면 모든 기록이 안전하게 보관됩니다</p>
                </div>

                <div class="login-stack-md">
                    <button id="login-btn" class="login-google-btn">
                        <div class="login-google-mark">G</div>
                        구글 계정으로 시작하기
                    </button>

                    <div class="login-divider">또는 이메일로 계속하기</div>

                    <button id="login-btn-email" class="login-submit-btn" style="background: #f1f5f9; color: #475569;">
                        이메일 주소로 계속하기
                    </button>
                </div>

                <div class="login-footer">
                    <p style="font-weight: 800; margin-bottom: 12px; font-size: 0.85rem;">로그인 후의 즐거움</p>
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
                        <span class="login-badge">기억의 영구 보존</span>
                        <span class="login-badge">트리 동기화</span>
                        <span class="login-badge">비밀 기록 관리</span>
                    </div>
                </div>

                <a href="/" class="login-link-btn">나중에 기록할게요 (홈으로)</a>
            </div>
        </div>
    </div>

    <!-- Email Auth Modal -->
    <div id="email-auth-modal" class="auth-modal is-hidden">
        <div class="auth-modal-content">
            <button class="auth-modal-close" id="email-auth-close">&times;</button>
            <h2 id="email-auth-title" class="login-section-title" style="font-size: 1.4rem; font-weight: 900; margin-bottom: 8px;">이메일로 로그인</h2>
            <p id="email-auth-helper" class="login-muted" style="margin-bottom: 24px;">이미 만든 이메일 계정으로 로그인합니다</p>
            <form id="email-auth-form" class="login-form">
                <div class="login-field">
                    <label class="login-label">이메일 주소</label>
                    <input type="email" id="email-auth-email" class="login-input" placeholder="example@mail.com" required>
                </div>
                <div class="login-field">
                    <label class="login-label">비밀번호</label>
                    <input type="password" id="email-auth-password" class="login-input" placeholder="••••••" required>
                </div>
                <button type="submit" id="email-auth-submit" class="login-submit-btn">로그인</button>
            </form>
            <button id="email-auth-toggle" class="login-link-btn" style="margin-top: 24px; width: 100%; display: block;">계정이 없나요? 회원가입으로 전환</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <!-- App Scripts -->
    <script src="/src/runtime-config.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared-utils.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared-layout.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/postgres-client-browser.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/auth.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/concept-state.js?v=20260414_v15_absolute_zero"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var googleBtn = document.getElementById('login-btn');
            var emailBtn = document.getElementById('login-btn-email');
            var emailModal = document.getElementById('email-auth-modal');
            var emailClose = document.getElementById('email-auth-close');

            if (googleBtn) {
                googleBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (window.signInWithGoogle) window.signInWithGoogle();
                });
            }

            if (emailBtn) {
                emailBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (emailModal) emailModal.classList.remove('is-hidden');
                });
            }

            if (emailClose) {
                emailClose.addEventListener('click', function() {
                    if (emailModal) emailModal.classList.add('is-hidden');
                });
            }
        });
    </script>
</body>
</html>
</body>
</html>
