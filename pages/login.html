<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다 - Lovetree</title>
        <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body class="login-page" data-concept-page="login">
    <div class="login-container" id="concept-main">
        <div class="login-logo">러브트리</div>
        
        <header class="login-header">
            <h1>다시, 당신의 사랑을<br>기록할 시간입니다</h1>
            <p>흩어진 순간들을 모아 하나의 나무로 완성하세요.<br>로그인하면 모든 기록이 안전하게 보관됩니다.</p>
        </header>

<div class="login-actions">
  <!-- Google Login -->
  <a href="#" id="login-btn-google" class="btn-social">
    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" width="20" height="20">
    구글 계정으로 시작하기
  </a>

  <!-- Email Login -->
  <a href="#" id="login-btn-email" class="btn-social btn-brick-main">
    이메일 주소로 계속하기
  </a>
</div>

<!-- Email Auth Modal (hidden by default) -->
<div id="email-auth-modal" class="auth-modal is-hidden">
  <div class="auth-modal-content">
    <button class="auth-modal-close" id="email-auth-close">&times;</button>
    <h2 id="email-auth-title">이메일로 로그인</h2>
    <p id="email-auth-helper" class="auth-modal-helper">이미 만든 이메일 계정으로 로그인합니다.</p>
    <form id="email-auth-form">
      <input type="email" id="email-auth-email" placeholder="이메일 주소" required>
      <input type="password" id="email-auth-password" placeholder="비밀번호" required>
      <button type="submit" id="email-auth-submit" class="btn-primary">로그인</button>
    </form>
    <button id="email-auth-toggle" class="btn-text">계정이 없나요? 회원가입으로 전환</button>
  </div>
</div>

        <!-- Benefits Recognition -->
        <section class="benefits-area">
            <h3>로그인 후의 즐거움</h3>
            <div class="benefits-grid">
                <span class="benefit-tag">기억의 영구 보존</span>
                <span class="benefit-tag">트리 동기화</span>
                <span class="benefit-tag">비밀 기록 관리</span>
                <span class="benefit-tag">따뜻한 소통</span>
            </div>
        </section>

<!-- Back to Home -->
  <a href="/" class="back-subtle">나중에 기록할게요 (홈으로)</a>
</div>

<style>
.auth-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.auth-modal.is-hidden { display: none; }
.auth-modal-content {
  background: white;
  padding: 32px;
  border-radius: 16px;
  width: 90%;
  max-width: 360px;
  position: relative;
}
.auth-modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: #666;
}
.auth-modal-helper {
  font-size: 0.85rem;
  color: #666;
  margin-bottom: 20px;
}
#email-auth-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#email-auth-form input {
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 1rem;
}
#email-auth-submit {
  padding: 14px;
  background: #e85a4f;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}
#email-auth-submit:disabled {
  background: #ccc;
}
.btn-text {
  background: none;
  border: none;
  color: #666;
  font-size: 0.85rem;
  cursor: pointer;
  margin-top: 16px;
  text-decoration: underline;
}
</style>

<!-- Firebase SDK (External) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<!-- Postgres Client (data layer) -->
<script src="/src/postgres-client-browser.js"></script>

<!-- Integration with existing auth logic -->
<script src="/src/runtime-config.js"></script>
<script src="/src/shared-utils.js"></script>
<script src="/src/shared.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/concept-state.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var googleBtn = document.getElementById('login-btn-google');
  var emailBtn = document.getElementById('login-btn-email');
  var emailModal = document.getElementById('email-auth-modal');
  var emailClose = document.getElementById('email-auth-close');

  if (googleBtn) {
    googleBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (window.signInWithGoogle) {
        window.signInWithGoogle();
      }
    });
  }

  if (emailBtn) {
    emailBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (emailModal) emailModal.classList.remove('is-hidden');
    });
  }

  if (emailClose) {
    emailClose.addEventListener('click', function() {
      if (emailModal) emailModal.classList.add('is-hidden');
    });
  }

  if (emailModal) {
    emailModal.addEventListener('click', function(e) {
      if (e.target === emailModal) emailModal.classList.add('is-hidden');
    });
  }
});
</script>
</body>
</html>
