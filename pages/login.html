<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relovetree - 로그인</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="/assets/css/login.css">

    <meta name="relovetree-app-check-site-key" content="">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app-check.js"></script>
    <script src="/src/firebase-firestore-compat.js"></script>
</head>

<body data-page="login">
    <div class="login-shell">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-mark">
                    L
                </div>
                <div>
                    <h1 class="login-title">Relovetree 로그인</h1>
                    <p class="login-muted">이메일 또는 Google 계정으로 로그인/회원가입할 수 있습니다.</p>
                </div>
            </div>

            <div class="login-stack-sm">
                <button type="button" onclick="window.signInWithGoogle && window.signInWithGoogle()"
                    class="login-google-btn">
                    <span class="login-google-mark">G</span>
                    <span>Google 계정으로 계속하기</span>
                </button>
                <p class="login-divider">또는</p>
            </div>

            <div class="login-stack-md">
                <div class="login-row">
                    <h2 id="email-auth-title" class="login-section-title">이메일로 로그인</h2>
                    <button type="button" id="email-auth-toggle" class="login-toggle-btn">
                        계정이 없나요? 회원가입으로 전환
                    </button>
                </div>
                <p id="email-auth-helper" class="login-muted">이미 만든 이메일 계정으로 로그인합니다.</p>
                <form id="email-auth-form" class="login-form">
                    <div class="login-field">
                        <label for="email-auth-email" class="login-label">이메일</label>
                        <input id="email-auth-email" type="email" autocomplete="email"
                            class="login-input"
                            required>
                    </div>
                    <div class="login-field">
                        <label for="email-auth-password" class="login-label">비밀번호</label>
                        <input id="email-auth-password" type="password" autocomplete="current-password"
                            class="login-input"
                            minlength="6" required>
                    </div>
                    <button id="email-auth-submit" type="submit" class="login-submit-btn">
                        로그인
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <button type="button" onclick="window.location.href='/index.html'" class="login-link-btn">
                    메인 화면으로 돌아가기
                </button>
            </div>
        </div>
    </div>

    <script src="/src/runtime-config.js"></script>
    <script src="/src/shared-storage.js"></script>
    <script src="/src/shared-dom.js"></script>
    <script src="/src/shared-theme.js"></script>
    <script src="/src/shared-layout.js"></script>
    <script src="/src/shared-utils.js"></script>
    <script src="/src/shared.js"></script>
    <script src="/src/auth.js"></script>
</body>

</html>
