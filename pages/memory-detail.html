<!-- frontend-concept-v2/memory-detail.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기억 상세 - Lovetree</title>
        <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/memory-detail.css">
</head>
<body class="detail-page" data-concept-page="memory-detail">
    <div class="mob-frame" id="concept-main">
        <!-- 단일 비디오 -->
        <header class="detail-header">
            <button class="btn-header" onclick="window.history.back()">←</button>
            <span class="header-brand">러브트리 기록</span>
            <button class="btn-header">⋮</button>
        </header>

        <main class="detail-scroll">
            <!-- 메인 비디오 플레이어 -->
            <section class="hero-player" id="video-skeleton">
                <img src="https://images.unsplash.com/photo-1542332213-31f87348057f?q=80&w=800&auto=format&fit=crop" alt="기억 영상">
                <div class="play-btn-large"></div>
                <!-- 스keleton 로더 -->
                <div class="skeleton-loader" data-skeleton="video"></div>
            </section>

            <!-- 기록 상세 정보 -->
            <section class="detail-info">
                <span class="detail-date">2023. 11. 15</span>
                <h2>콘서트의 전율</h2>
                
                <div class="detail-tags" id="tags-skeleton">
                    <span class="detail-tag">#설렘</span>
                    <span class="detail-tag">#감동</span>
                    <span class="detail-tag">#첫콘</span>
                    <!-- 스keleton -->
                    <div class="skeleton-loader" data-skeleton="tags"></div>
                </div>

                <!-- 스크랩북 감정 메모 -->
                <div class="memo-box">
                    첫 디아웃 콘서트에 다녀왔다. 그 현장의 압도감에 몸이 떨렸다. 정말 잊지 못할 밤이었다.
                </div>

                <!-- 연결 경로: 이어지는 기억 -->
                <div class="related-section">
                    <h3>그날의 연결 경로</h3>
                    <div class="related-path">
                        <a href="#" class="r-item">
                            <div class="r-thumb">
                                <img src="https://images.unsplash.com/photo-1493225255766-d9584f8606e9?q=80&w=200&auto=format&fit=crop" alt="이전 기억">
                            </div>
                            <div class="r-info">
                                <span class="r-title">첫 만남의 기록</span>
                                <span class="r-date">2023. 11. 15</span>
                            </div>
                        </a>
                        <a href="#" class="r-item active">
                            <div class="r-thumb">
                                <img src="https://images.unsplash.com/photo-1542332213-31f87348057f?q=80&w=200&auto=format&fit=crop" alt="현재 기억">
                            </div>
                            <div class="r-info">
                                <span class="r-title">콘서트의 전율</span>
                                <span class="r-date">현재 머물러 있는 기록</span>
                            </div>
                        </a>
                        <a href="#" class="r-item">
                            <div class="r-thumb">
                                <img src="https://images.unsplash.com/photo-1514525253361-bee8718a74a2?q=80&w=200&auto=format&fit=crop" alt="다음 기억">
                            </div>
                            <div class="r-info">
                                <span class="r-title">공연 종료 후의 여운</span>
                                <span class="r-date">2023. 11. 15</span>
                            </div>
                        </a>
                    </div>
                </div>
            </section>
        </main>

        <!-- 감상 중심 액션 바 -->
        <footer class="bottom-bar">
            <a href="#" class="bottom-item">
                <span class="b-ico">♥</span>
                <span class="b-num">125</span>
            </a>
            <a href="#" class="bottom-item">
                <span class="b-ico">💬</span>
                <span class="b-num">3</span>
            </a>
            <a href="#" class="bottom-item">
                <span class="b-ico">↗</span>
                <span class="b-num">공유</span>
            </a>
        </footer>
    </div>
    <script src="/src/api.js"></script>
    <script src="/src/concept-state.js"></script>
</body>
</html>
