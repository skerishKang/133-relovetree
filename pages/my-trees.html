<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>나의 러브트리 - Relovetree</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS Unified Design System V3 -->
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v3">
    <link rel="stylesheet" href="/assets/css/dashboard-v3.css?v=20260414_v3">
</head>
<body class="my-trees-page">
    
    <!-- Standard GNB (V3 Centered Style) -->
    <nav class="gnb-v2">
        <div class="gnb-inner shell">
            <a href="/" class="gnb-logo">Relovetree</a>
            <div class="gnb-links">
                <a href="/pages/lovetree.html">러브트리</a>
                <a href="/pages/community.html">커뮤니티</a>
                <div id="user-menu" style="display: flex; align-items: center; gap: 16px;">
                    <a href="/pages/my-trees.html" class="active" style="font-weight: 800;">내 트리</a>
                    <button id="logout-btn" style="font-size: 0.85rem; color: #64748b;">로그아웃</button>
                    <div class="user-avatar-mini" style="width: 32px; height: 32px; background: #eee; border-radius: 50%;"></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="shell dash-shell" id="content-area">
        <!-- Main Dashboard Area (Left) -->
        <div class="dash-main">
            <header class="dash-header">
                <h1>나의 러브트리</h1>
                <button id="btn-new-tree" class="btn-create-tree">새 러브트리 만들기</button>
            </header>

            <!-- Trees Grid (Rendered by JS) -->
            <section class="trees-grid-v3" id="tree-list">
                <!-- Example Card for immediate visual feedback (Will be replaced by JS) -->
            </section>

            <!-- Loading/Empty State Managed by JS -->
            <div id="loading-area" style="text-align: center; padding: 100px 0; display: none;">
                <div class="loading-spinner"></div>
                <p>소중한 나무들을 불러오는 중...</p>
            </div>
            <div id="empty-state" style="display: none; text-align: center; padding: 100px 0;">
                <div style="font-size: 4rem; margin-bottom: 24px;">🌱</div>
                <h2 style="font-weight: 900; margin-bottom: 12px;">아직 정원이 비어있네요</h2>
                <p style="color: #64748b; margin-bottom: 32px;">첫 번째 사랑의 기억을 심어보시겠어요?</p>
                <button id="btn-first-tree" class="btn-create-tree">첫 트리 만들기</button>
            </div>
            <div id="error-state" style="display: none; text-align: center; padding: 100px 0; color: #b56e6e;">
                <p id="error-message">데이터를 불러오지 못했습니다.</p>
                <button id="btn-retry-load" style="margin-top: 20px; text-decoration: underline;">다시 시도</button>
            </div>
        </div>

        <!-- Dashboard Sidebar (Right) -->
        <aside class="dash-sidebar">
            <h3 class="side-title">최근 수정한 순간</h3>
            <div class="recent-moments-list" id="recent-moments">
                <!-- Mock Recent Items -->
                <div class="moment-item-mini" style="opacity: 0.5; font-size: 0.8rem; padding: 20px 0;">최근 활동이 없습니다.</div>
            </div>
        </aside>
    </main>

    <!-- New Tree Modal (Image-aligned) -->
    <div id="new-tree-modal" class="modal-overlay is-hidden">
        <div class="modal-content" style="background: #fff; padding: 32px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);">
            <h3 style="font-weight: 900; margin-bottom: 24px;">새 러브트리 만들기</h3>
            <input type="text" id="new-tree-name" placeholder="트리의 이름을 지어주세요" style="width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 24px;">
            <div class="modal-actions" style="display: flex; gap: 12px;">
                <button id="btn-cancel-tree" style="flex: 1; padding: 14px; border-radius: 12px; background: #f1f5f9; border: none; font-weight: 700;">취소</button>
                <button id="btn-create-confirm" style="flex: 2; padding: 14px; border-radius: 12px; background: #b56e6e; color: #fff; border: none; font-weight: 800;">트리 생성</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="/src/runtime-config.js"></script>
    <script src="/src/shared-utils.js"></script>
    <script src="/src/shared.js"></script>
    <script src="/src/postgres-client-browser.js"></script>
    <script src="/src/auth.js"></script>
    <script src="/src/api.js"></script>
    <script src="/src/flow-shared.js"></script>
    <!-- Updated JS for modern rendering -->
    <script src="/src/my-trees.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.initStandardAuthUI) window.initStandardAuthUI();
        });
    </script>
</body>
</html>
