<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기억의 조각 - Lovetree</title>
        <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="/assets/css/story-view.css">
</head>
<body class="story-page">
  <!-- 몰입형 배경: 트리 중심부 -->
  <div class="story-bg-overlay"></div>
  <div class="story-trunk-line"></div>

  <!-- 장면 궤적: 기억이름 진행중 -->
  <div class="story-progress-container">
    <div class="st-bar complete"><div class="st-fill"></div></div>
    <div class="st-bar active"><div class="st-fill"></div></div>
    <div class="st-bar"><div class="st-fill"></div></div>
    <div class="st-bar"><div class="st-fill"></div></div>
  </div>

  <!-- 상단 내비게이션 -->
  <header class="story-top-nav">
    <div class="st-brand">트리 경로</div>
    <button class="btn-story-close" onclick="window.history.back()">←</button>
  </header>

  <!-- 메인 콘텐츠 트리에서 이어지는 기억 -->
  <main class="story-main">
    <div class="slider-track" data-binding-state="empty">
      <article class="story-card">
        <section class="st-video-box">
          <img src="https://images.unsplash.com/photo-1542332213-31f87348057f?q=80&w=800&auto=format&fit=crop" alt="기억 장면 첫번째">
          <div class="st-play-btn"></div>
        </section>

        <section class="st-content">
          <span class="st-date">2023. 11. 15</span>
          <h2 class="st-title">콘서트의 운율</h2>

          <div class="st-memo-box">
            <p class="st-memo-text">
              "처음으로 딱딱 같은 공간에서 있었는 사실만으로도 가사가 벅찼筝.
              머릿속의 운율이 생 생 못할 기록같다."
            </p>
          </div>
        </section>
      </article>
    </div>
  </main>

  <!-- 하단 액션: 제목 공유 공감 -->
  <footer class="story-footer-actions">
    <a href="#" class="st-action-btn">
      <div class="st-action-ico"><i class="st-sym">♥</i></div>
      <span class="st-action-lbl">125</span>
    </a>
    <a href="#" class="st-action-btn">
      <div class="st-action-ico"><i class="st-sym">💬</i></div>
      <span class="st-action-lbl">3</span>
    </a>
    <a href="#" class="st-action-btn">
      <div class="st-action-ico"><i class="st-sym">↗</i></div>
      <span class="st-action-lbl">공유</span>
    </a>
  </footer>

  <script src="/src/concept-state.js"></script>
  <script>
    // 토스트 전환 액션 발생 로직 (개념 구현중)
  </script>
</body>
</html>
