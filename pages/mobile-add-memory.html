<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>순간 기록하기 - Lovetree</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/mobile-add-memory.css">
</head>
<body class="add-memory-page">
    <!-- Header: Quiet Focus -->
    <nav class="add-header">
        <button class="btn-back" onclick="window.history.back()">←</button>
        <h1>순간 기록하기</h1>
    </nav>

    <!-- Content: Emotional Journey -->
    <main class="add-container" id="concept-main">
        <!-- Step 1: Link Discovery -->
        <section class="journey-step">
            <label class="step-label">어떤 영상인가요?</label>
            <input type="text" id="video-url" name="videoUrl" class="input-minimal" placeholder="유튜브 링크를 알려주세요">
        </section>

        <!-- Step 2: Visual Fragment Preview -->
        <section class="moment-preview-node" id="preview-node">
            <div class="preview-img-box" id="preview-thumb">
                <span>🎬</span>
            </div>
            <div class="preview-text-info">
                <div class="preview-title" id="preview-title">새로운 기억</div>
                <div class="preview-date" id="preview-date">2023. 10. 26</div>
            </div>
        </section>

        <!-- Step 3: Emotional Details -->
        <form id="memory-form">
            <section class="journey-step">
                <label class="step-label">그때의 마음은 어땠나요?</label>
                
                <div class="field-row">
                    <div class="field-item">
                        <span class="input-small-label">제목</span>
                        <input type="text" id="memory-title" name="title" class="input-soft" placeholder="기억의 이름을 지어주세요">
                    </div>
                    <div class="field-item">
                        <span class="input-small-label">날짜</span>
                        <input type="date" id="memory-date" name="date" class="input-soft" value="2023-10-26">
                    </div>
                </div>

                <div class="emotion-field">
                    <span class="input-small-label">어떤 기분이었나요?</span>
                    <div class="emotion-tabs" id="emotion-tabs">
                        <div class="emotion-chip" data-emotion="설렘">설렘</div>
                        <div class="emotion-chip selected" data-emotion="감동">감동</div>
                        <div class="emotion-chip" data-emotion="감복">감복</div>
                        <div class="emotion-chip" data-emotion="응원">응원</div>
                        <div class="emotion-chip" data-emotion="치유">치유</div>
                    </div>
                </div>

                <div>
                    <span class="input-small-label">나만의 감정 기록</span>
                    <textarea id="memory-memo" name="memo" class="memo-journal" placeholder="그날이 얼마나 특별했던지 이야기해 보세요.."></textarea>
                </div>
            </section>

            <!-- Step 4: Connection Context -->
            <section class="journey-step">
                <label class="step-label">어떤 기억과 연결할까요?</label>
                <div class="connection-flow">
                    <select id="tree-select" name="treeId" class="select-connection">
                        <option value="">첫 번째 기록으로 시작하기</option>
                        <option value="tree-1">내 러브트리에 연결하기</option>
                        <option value="tree-2">기존 트리에 붙여보기</option>
                    </select>
                </div>
            </section>
        </form>
    </main>

    <!-- Footer: Planting Action -->
    <footer class="planting-footer">
        <button class="btn-plant" id="btn-submit-memory">
            <span class="state-idle">러브트리에 심기</span>
            <span class="state-loading is-hidden">기억을 심는 중...</span>
        </button>
    </footer>

    <script src="/src/api.js"></script>
    <script src="/src/add-memory.js"></script>
    <script>
        // Simple Interaction: Emotion chips
        document.querySelectorAll('.emotion-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                this.parentElement.querySelectorAll('.emotion-chip').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // Submit button click handler - go to branch selection
        document.getElementById('btn-submit-memory').addEventListener('click', function() {
            // Validate and submit
            const form = document.getElementById('memory-form');
            if (form) {
                // If valid, go to branch selection page
                window.location.href = '/pages/mobile-add-branch.html';
            }
        });

        // Simulating the "Vibe Shift" when video is recognized
        const videoInput = document.getElementById('video-url');
        const previewNode = document.getElementById('preview-node');
        
        if (videoInput && previewNode) {
            videoInput.addEventListener('input', function(e) {
                if (e.target.value.length > 10) {
                    previewNode.style.transform = 'rotate(0deg) scale(1.05)';
                    previewNode.style.borderColor = '#b56e6e';
                    previewNode.querySelector('.preview-img-box').style.background = '#000';
                    previewNode.querySelector('.preview-img-box').innerHTML = '<img src="https://images.unsplash.com/photo-1542332213-31f87348057f?q=80&w=300&auto=format&fit=crop" class="preview-dynamic-img">';

                }
            });
        }
    </script>
</body>
</html>
