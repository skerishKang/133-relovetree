<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>설정 - Lovetree</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v15_absolute_zero">
    <link rel="stylesheet" href="/assets/css/settings-v3.css?v=20260414_v15_absolute_zero">

    <!-- Layout Guardian V15: Absolute Zero Sync -->
    <script>
        (function() {
            const v = "V15_ABSOLUTE_ZERO_20260414";
            console.log("[Lovetree] HTML Version: " + v);
            const purge = () => {
                const legacy = document.querySelectorAll('.top-nav, .header, #header, .gnb:not([data-global-header="1"]), nav:not([data-global-header="1"]), .brand-link, .brand-title');
                legacy.forEach(el => el.remove());
            };
            purge();
            if (window.MutationObserver) {
                const observer = new MutationObserver(purge);
                observer.observe(document.documentElement, { childList: true, subtree: true });
                setTimeout(() => observer.disconnect(), 5000);
            }
        })();
    </script>
</head>
<body class="settings-page" data-page="settings">
    <!-- Navbar injected by shared-layout.js -->
    <div class="page-wrapper">
    <main class="settings-shell">
        <header class="settings-header-v3">
            <h1>공개 범위 설정</h1>
            <p style="color: #64748b; font-size: 0.95rem;">당신의 소중한 나무를 누구와 함께 나눌지 결정하세요.</p>
        </header>

        <!-- Visibility Selection (Image 1 targets) -->
        <section class="visibility-group">
            <div class="vis-card active" data-value="private">
                <div class="vis-icon">🔒</div>
                <div class="vis-info">
                    <h4>나만 보기</h4>
                    <p>본인만 LoveTree를 볼 수 있습니다.</p>
                </div>
                <div class="vis-toggle"></div>
            </div>

            <div class="vis-card" data-value="link">
                <div class="vis-icon">🔗</div>
                <div class="vis-info">
                    <h4>링크를 가진 사람만</h4>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <p>링크를 알고 있는 사람에게만 공개됩니다.</p>
                        <span style="background: #b56e6e; color: #fff; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 800;">Copy Link</span>
                    </div>
                </div>
                <div class="vis-toggle"></div>
            </div>

            <div class="vis-card" data-value="public">
                <div class="vis-icon">💗</div>
                <div class="vis-info">
                    <h4>커뮤니티에 공개</h4>
                    <p>모든 Lovetree 사용자가 감상할 수 있습니다.</p>
                </div>
                <div class="vis-toggle"></div>
            </div>
        </section>

        <!-- Secondary Toggles (Image 1 Bottom) -->
        <section style="margin-top: 40px;">
            <div class="setting-item-v3">
                <div class="item-info-v3">
                    <h4>댓글 허용</h4>
                    <p>내 LoveTree에 다른 사용자가 댓글을 남길 수 있습니다.</p>
                </div>
                <div class="switch-v3 on"></div>
            </div>

            <div class="setting-item-v3">
                <div class="item-info-v3">
                    <h4>좋아요 허용</h4>
                    <p>내 LoveTree에 좋아요 표현을 받을 수 있습니다.</p>
                </div>
                <div class="switch-v3 on"></div>
            </div>

            <div class="setting-item-v3">
                <div class="item-info-v3">
                    <h4>프로필 표시 이름 공개</h4>
                    <p>LoveTree 옆에 내 프로필 표시 이름을 공개합니다.</p>
                </div>
                <div class="switch-v3"></div>
            </div>
        </section>

        <!-- Action Footer -->
        <footer class="settings-footer-v3">
            <button class="btn-save-settings" id="btn-save">완료</button>
        </footer>
    </main>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="/src/runtime-config.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared-utils.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared-layout.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/shared.js?v=20260414_v15_absolute_zero"></script>
    <script src="/src/auth.js?v=20260414_v15_absolute_zero"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.initStandardAuthUI) window.initStandardAuthUI();
            // Visibility Card Toggle Logic
            const cards = document.querySelectorAll('.vis-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    cards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                });
            });

            // Switch Logic
            const switches = document.querySelectorAll('.switch-v3');
            switches.forEach(sw => {
                sw.addEventListener('click', () => {
                    sw.classList.toggle('on');
                });
            });

            // Save Action
            document.getElementById('btn-save').addEventListener('click', () => {
                alert('설정이 저장되었습니다!');
                window.location.href = '/pages/my-trees.html';
            });
        });
    </script>
</body>
</html>
