<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 트리 관리 - Lovetree</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v13_ultimate">
    <link rel="stylesheet" href="/assets/css/owner-v2.css?v=20260414_v13_ultimate">

    <!-- Immediate Layout Purge (Prevention) -->
    <script>
        (function() {
            const purge = () => {
                const legacy = document.querySelectorAll('.top-nav, .header, #header, .gnb:not([data-global-header="1"]), nav:not([data-global-header="1"])');
                legacy.forEach(el => el.remove());
            };
            purge();
            if (window.MutationObserver) {
                const observer = new MutationObserver(purge);
                observer.observe(document.documentElement, { childList: true, subtree: true });
                setTimeout(() => observer.disconnect(), 3000);
            }
        })();
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <!-- Auth: Firebase / Data: Neon Postgres via compat layer -->
    <script src="/src/postgres-client-browser.js?v=20260414_v12_final"></script>
</head>

<body data-page="owner" class="owner-v2-active">
    <!-- GNB will be injected by shared-layout.js -->
    <div class="page-wrapper">
    <div class="owner-shell">
        <div class="owner-page-header">
            <h1 class="owner-page-title">내 트리 관리</h1>
            <p class="owner-page-subtitle" id="owner-subtitle">로그인한 계정의 트리만 표시됩니다.</p>
        </div>

        <div class="owner-card owner-card-pad owner-page-header">
            <div class="owner-create-row">
                <div class="owner-grow">
                    <label class="owner-label">새 트리 만들기</label>
                    <input id="new-tree-name" type="text" placeholder="예: 엔믹스, 뉴진스, 방탄소년단"
                        class="owner-input" />
                    <p class="owner-help">이름을 입력하면 에디터로 이동하며, 없는 트리는 자동으로 생성됩니다.</p>
                </div>
                <button id="create-tree-btn" type="button" class="owner-btn-primary">
                    에디터 열기
                </button>
            </div>
        </div>

        <div class="owner-card">
            <div class="owner-list-header">
                <div>
                    <h2 class="owner-section-title">내 트리 목록</h2>
                    <p class="owner-page-subtitle">이 페이지에서는 본인 소유 트리만 수정/삭제할 수 있습니다.</p>
                </div>
                <div class="owner-toolbar">
                    <div class="owner-filter-row">
                        <input id="tree-search" type="text" placeholder="이름/ID 검색"
                            class="owner-input" />
                        <select id="sort-select"
                            class="owner-select">
                            <option value="updated_desc">최근수정 최신순</option>
                            <option value="updated_asc">최근수정 오래된순</option>
                            <option value="name_asc">이름 오름차순</option>
                            <option value="name_desc">이름 내림차순</option>
                            <option value="nodes_desc">노드 많은순</option>
                            <option value="likes_desc">좋아요 많은순</option>
                            <option value="views_desc">조회 많은순</option>
                        </select>
                        <select id="page-size"
                            class="owner-select">
                            <option value="10">10개</option>
                            <option value="20" selected>20개</option>
                            <option value="50">50개</option>
                        </select>
                        <button id="refresh-btn" type="button" class="owner-btn-secondary">
                            새로고침
                        </button>
                        <button id="fork-check-all-btn" type="button" class="owner-btn-secondary">
                            전체 업데이트 확인
                        </button>
                        <button id="copy-view-link-btn" type="button" class="owner-btn-secondary">
                            링크 복사
                        </button>
                        <button id="reset-filters-btn" type="button" class="owner-btn-secondary">
                            초기화
                        </button>
                    </div>
                    <p id="results-summary" class="owner-summary"></p>
                </div>
            </div>

            <div class="owner-table-wrap">
                <table class="owner-table">
                    <thead>
                        <tr>
                            <th>트리</th>
                            <th>최근수정</th>
                            <th>노드</th>
                            <th>조회/좋아요/공유</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="owner-tree-tbody"></tbody>
                </table>
            </div>

            <div class="owner-pagination">
                <p id="pagination-label" class="owner-page-subtitle"></p>
                <div class="owner-filter-row" id="pagination-bar">
                    <button id="page-first" type="button"
                        class="owner-btn-secondary">처음</button>
                    <button id="page-prev" type="button"
                        class="owner-btn-secondary">이전</button>
                    <button id="page-next" type="button"
                        class="owner-btn-secondary">다음</button>
                    <button id="page-last" type="button"
                        class="owner-btn-secondary">마지막</button>
                </div>
            </div>
        </div>

        <dialog id="rename-dialog" class="owner-dialog">
            <div class="owner-dialog-body">
                <div class="owner-dialog-header">
                    <div>
                        <h3 class="owner-dialog-title">트리 이름 변경</h3>
                        <p id="rename-dialog-subtitle" class="owner-dialog-copy"></p>
                    </div>
                    <button type="button" id="rename-cancel-x" class="owner-btn-icon">✕</button>
                </div>
                <div class="owner-dialog-field">
                    <input id="rename-input" type="text" class="owner-input" />
                </div>
                <div class="owner-dialog-actions">
                    <button type="button" id="rename-cancel" class="owner-btn-secondary">취소</button>
                    <button type="button" id="rename-save" class="owner-btn-primary">저장</button>
                </div>
            </div>
        </dialog>

        <dialog id="delete-dialog" class="owner-dialog">
            <div class="owner-dialog-body">
                <div class="owner-dialog-header">
                    <div>
                        <h3 class="owner-dialog-title">트리 삭제</h3>
                        <p id="delete-dialog-subtitle" class="owner-dialog-copy"></p>
                    </div>
                    <button type="button" id="delete-cancel-x" class="owner-btn-icon">✕</button>
                </div>
                <div class="owner-dialog-field">
                    <p class="owner-muted">삭제하려면 아래 입력칸에 트리 ID를 그대로 입력하세요.</p>
                    <input id="delete-confirm-input" type="text" placeholder="트리 ID 입력"
                        class="owner-input" />
                </div>
                <div class="owner-dialog-actions">
                    <button type="button" id="delete-cancel" class="owner-btn-secondary">취소</button>
                    <button type="button" id="delete-confirm" class="owner-btn-danger">삭제</button>
                </div>
            </div>
        </dialog>

        <p class="owner-console-note">Lovetree Owner Console</p>
    </div>
    </div>

    <script src="/src/runtime-config.js?v=20260414_v13_ultimate"></script>

    <script src="/src/shared.js?v=20260414_v13_ultimate"></script>
    <script src="/src/auth.js?v=20260414_v13_ultimate"></script>
    <script src="/src/owner-ui-state.js?v=20260414_v13_ultimate"></script>
    <script src="/src/owner-api-client.js?v=20260414_v13_ultimate"></script>

    <script src="/src/owner-dialogs.js?v=20260414_v13_ultimate"></script>
    <script src="/src/owner-bindings.js?v=20260414_v13_ultimate"></script>
    <script src="/src/entries/owner.js?v=20260414_v13_ultimate"></script>
</body>

</html>
