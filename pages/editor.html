<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Critical for YouTube Embeds -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>LoveTree Editor</title>
    <!-- Tailwind CSS (Built locally for production) -->
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="/assets/css/editor-core.css">
    <link rel="stylesheet" href="/assets/css/editor-topbar.css">
    <link rel="stylesheet" href="/assets/css/editor-canvas.css">
    <link rel="stylesheet" href="/assets/css/editor-detail.css">
    <link rel="stylesheet" href="/assets/css/editor-ai.css">
    <link rel="stylesheet" href="/assets/css/editor-comments.css">
    <link rel="stylesheet" href="/assets/css/editor-timeline.css">
    <link rel="stylesheet" href="/assets/css/editor-responsive.css">

    <meta name="relovetree-app-check-site-key" content="">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Firebase SDK (Compat for easier integration with existing code) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>
    <script src="/src/firebase-firestore-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

</head>

<body data-page="editor">

    <!-- Top Bar -->
    <div class="editor-topbar">
        <div class="editor-topbar-group">
            <a href="/index.html" title="홈으로 돌아가기"
                class="editor-home-btn">
                <svg class="editor-icon-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
            </a>
            <h1 id="tree-title" class="editor-title-chip">
                나의 러브트리
            </h1>
            <span id="tree-readonly-badge" class="editor-readonly-badge is-hidden">
                읽기 전용
            </span>
        </div>
        <div class="editor-topbar-actions">
            <div class="editor-toggle-group">
                <button id="mode-tree-btn" onclick="setEditorMode('tree')"
                    class="editor-toggle-btn is-active">
                    트리
                </button>
                <button id="mode-timeline-btn" onclick="setEditorMode('timeline')"
                    class="editor-toggle-btn">
                    리스트
                </button>
            </div>
            <div class="editor-toggle-group">
                <button id="orientation-portrait-btn" onclick="setOrientationMode('portrait')"
                    class="editor-toggle-btn is-active">
                    세로
                </button>
                <button id="orientation-landscape-btn" onclick="setOrientationMode('landscape')"
                    class="editor-toggle-btn">
                    가로
                </button>
            </div>
            <div class="editor-zoom-chip">
                <span>ZOOM</span>
                <span id="zoom-level" class="editor-zoom-value">100%</span>
            </div>
            <div id="tree-stats-banner" class="editor-stats-chip">
                <span id="tree-stats-text">노드 0 · 순간 0 · 조회 0 · 좋아요 0 · 공유 0</span>
            </div>
            <button onclick="zoomOut()" title="줌 아웃"
                class="editor-tool-btn">
                <svg class="editor-icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path>
                </svg>
            </button>
            <button onclick="zoomIn()" title="줌 인"
                class="editor-tool-btn">
                <svg class="editor-icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
            </button>
            <div class="editor-separator"></div>
            <button id="btn-auto-connect" onclick="autoConnectTimeline()"
                class="editor-action-btn">
                자동 연결
            </button>
            <button id="btn-clear-connections" onclick="clearAllConnections()"
                class="editor-action-btn">
                연결선 초기화
            </button>
            <button id="btn-reset" onclick="resetLayout()"
                class="editor-action-btn editor-action-btn-danger">
                초기화
            </button>
            <button id="ai-helper-btn" type="button" onclick="openAiHelper()"
                class="editor-action-btn editor-action-btn-dark">
                AI 도우미
            </button>
            <div class="editor-separator"></div>
            <button id="like-btn" onclick="toggleLike()"
                class="editor-counter-btn is-like">
                <svg class="editor-icon-sm" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                </svg>
                <span id="like-count">0</span>
            </button>
            <button id="comment-btn" onclick="openCommentsModal()"
                class="editor-counter-btn is-comment">
                <svg class="editor-icon-sm" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM18 14H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z" />
                </svg>
                <span id="comment-count">0</span>
            </button>
            <button id="fork-btn" onclick="forkTreeToMyAccount()" type="button"
                class="editor-counter-btn is-fork is-hidden">
                내 트리로 가져오기
            </button>
            <button id="share-btn" onclick="shareTree()"
                class="editor-share-btn">
                <svg class="editor-icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z">
                    </path>
                </svg>
                Share
            </button>
            <button id="lang-btn" onclick="toggleLanguage()"
                class="editor-lang-btn">
                English
            </button>
        </div>
    </div>

    <!-- Canvas Wrapper -->
    <div id="wrapper" class="editor-canvas-shell">
        <div id="canvas">
            <svg id="connections" class="editor-connections-layer">
                <!-- Connections injected here -->
            </svg>
            <!-- Nodes injected here -->
        </div>

        <button onclick="createNewNode()"
            class="editor-fab">
            <svg class="editor-fab-icon" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            <span class="editor-fab-label">
                새로운 순간 추가
            </span>
        </button>

        <!-- 미니맵 -->
        <div id="minimap" class="editor-minimap editor-desktop-block is-hidden">
            <canvas id="minimap-canvas" class="editor-minimap-canvas"></canvas>
            <div id="minimap-viewport"
                class="editor-minimap-viewport"></div>
        </div>

        <div id="timeline" class="editor-timeline-shell is-hidden"></div>
    </div>



    <!-- Unified Detail Modal -->
    <dialog id="detail-modal" class="editor-detail-dialog">
        <div class="editor-detail-shell">
            <!-- Left: Video Player -->
            <div class="editor-detail-media">
                <div class="editor-video-box">
                    <div id="video-placeholder"
                        class="editor-video-placeholder">
                        <div class="editor-video-placeholder-icon">
                            <svg class="editor-play-icon" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </div>
                        <p class="editor-page-copy">영상을 보려면 클릭하세요</p>
                        <p class="editor-muted-xs">썸네일은 숨기고, 재생 시에만 영상을 불러옵니다.</p>
                    </div>
                    <iframe id="detail-video" class="editor-video-iframe is-hidden" src="" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
                </div>

                <!-- Fallback / External Link Button -->
                <a id="external-link" href="#" target="_blank"
                    class="editor-video-link">
                    <span>YouTube에서 보기</span>
                    <svg class="editor-icon-xs" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                    </svg>
                </a>

                <div class="editor-floating-close">
                    <button onclick="closeModal('detail-modal')"
                        class="editor-mobile-close editor-mobile-only">
                        <svg class="editor-icon-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Right: Details & Moments -->
            <div class="editor-detail-side">
                <!-- Header -->
                <div class="editor-detail-header">
                    <div>
                        <h2 id="detail-title" class="editor-detail-title">Title</h2>
                        <p id="detail-date" class="editor-detail-date">Date</p>
                    </div>
                    <div class="editor-icon-actions">
                        <button onclick="openNodeAiHelperFromDetail()"
                            class="editor-icon-btn editor-icon-btn-indigo"
                            title="AI로 이 노드 다듬기">
                            <svg class="editor-icon-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 3v3m0 12v3m9-9h-3M6 12H3m15.364-6.364l-2.121 2.121M8.757 15.243l-2.121 2.121m0-12.728l2.121 2.121m8.486 8.486l2.121 2.121" />
                            </svg>
                        </button>
                        <button onclick="enableEditMode()"
                            class="editor-icon-btn editor-icon-btn-brand"
                            title="수정">
                            <svg class="editor-icon-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
                                </path>
                            </svg>
                        </button>
                        <button onclick="deleteNode()"
                            class="editor-icon-btn editor-icon-btn-danger"
                            title="삭제">
                            <svg class="editor-icon-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                </path>
                            </svg>
                        </button>
                        <button onclick="closeModal('detail-modal')"
                            class="editor-icon-btn editor-desktop-close editor-desktop-block is-hidden"
                            title="닫기">
                            <svg class="editor-icon-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Edit Form (Hidden by default) -->
                <div id="edit-form" class="editor-form-panel is-hidden">
                    <form onsubmit="saveNodeDetails(event)" class="editor-form-stack">
                        <div>
                            <label class="editor-form-label">제목</label>
                            <input type="text" id="edit-title"
                                class="editor-input">
                        </div>
                        <div>
                            <label class="editor-form-label">날짜</label>
                            <input type="date" id="edit-date"
                                class="editor-input">
                        </div>
                        <div>
                            <label class="editor-form-label">설명</label>
                            <textarea id="edit-description" rows="3"
                                class="editor-textarea"></textarea>
                        </div>
                        <div>
                            <label class="editor-form-label">유튜브 URL</label>
                            <input type="text" id="edit-video" placeholder="https://youtu.be/..."
                                class="editor-input">
                            <p id="edit-video-error" class="editor-error-text is-hidden"></p>
                            <div id="edit-video-preview" class="editor-video-preview is-hidden">
                                <div class="editor-video-preview-row">
                                    <img id="edit-video-thumb" src="" alt="YouTube Thumbnail"
                                        class="editor-video-thumb" />
                                    <div class="editor-video-preview-copy">
                                        <p id="edit-video-preview-text" class="editor-video-preview-text"></p>
                                        <a id="edit-video-preview-link" href="#" target="_blank"
                                            class="editor-inline-link">YouTube에서 열기</a>
                                    </div>
                                    <button type="button" onclick="clearDetailVideoInput()"
                                        class="editor-inline-btn">제거</button>
                                </div>
                            </div>
                            <div class="editor-search-row">
                                <div class="editor-search-actions">
                                    <input type="text" id="edit-video-search" placeholder="키워드로 검색 (예: 아이돌 무대)"
                                        class="editor-input-sm editor-search-input" />
                                    <button type="button" onclick="searchYouTubeForDetail()"
                                        class="editor-dark-btn">검색</button>
                                    <button type="button" onclick="recommendYouTubeForDetail()"
                                        class="editor-action-btn">추천 3개</button>
                                </div>
                                <div id="edit-video-search-result" class="editor-search-result"></div>
                            </div>
                        </div>
                        <div>
                            <label class="editor-form-label">이미지 (Pro)</label>
                            <input type="file" id="edit-image" accept="image/*"
                                class="editor-file-input">
                            <div id="image-preview-container" class="editor-image-preview-wrap is-hidden">
                                <img id="image-preview" src="" alt="Preview"
                                    class="editor-image-preview" />
                                <button type="button" onclick="removeImage()"
                                    class="editor-inline-btn editor-inline-btn-danger">이미지 삭제</button>
                            </div>
                        </div>
                        <div class="editor-form-actions">
                            <button type="button" onclick="disableEditMode()"
                                class="editor-subtle-btn">취소</button>
                            <button type="button" id="ai-draft-apply-btn" onclick="applyAiTreeDraftFromDetail()"
                                class="editor-dark-btn is-hidden">이 노드만 적용</button>
                            <button type="submit" id="edit-save-btn"
                                class="editor-primary-btn">저장</button>
                        </div>
                    </form>
                </div>

                <!-- Moments List -->
                <div class="editor-content-panel custom-scroll" id="moments-list">
                    <!-- Moments injected here -->
                </div>

                <!-- Add Moment Input -->
                <div class="editor-input-panel">
                    <form onsubmit="addMomentFromDetail(event)" class="editor-moment-form">
                        <div class="editor-moment-main">
                            <div class="editor-moment-row">
                                <div class="editor-time-row">
                                    <input type="text" id="new-moment-time" placeholder="0:00"
                                        class="editor-time-input">
                                    <button type="button" onclick="setCurrentMomentTime()"
                                        class="editor-chip-btn">현재
                                        시간</button>
                                </div>
                                <div class="editor-moment-row">
                                    <input type="text" id="new-moment-text" placeholder="이 순간에 대한 코멘트..."
                                        class="editor-moment-input">
                                    <button type="button" onclick="openMomentAiHelper()"
                                        class="editor-dark-btn">AI</button>
                                </div>
                            </div>
                            <div id="moment-ai-result" class="editor-moment-ai-result"></div>
                        </div>
                        <div class="editor-feeling-row">
                            <div class="editor-emoji-row">
                                <label class="editor-emoji-label"><input type="radio" name="new-moment-feeling" value="love"
                                        class="editor-emoji-input" checked><span
                                        class="editor-emoji-chip is-love">😍</span></label>
                                <label class="editor-emoji-label"><input type="radio" name="new-moment-feeling" value="tear"
                                        class="editor-emoji-input"><span
                                        class="editor-emoji-chip is-tear">😭</span></label>
                                <label class="editor-emoji-label"><input type="radio" name="new-moment-feeling"
                                        value="funny" class="editor-emoji-input"><span
                                        class="editor-emoji-chip is-funny">🤣</span></label>
                                <label class="editor-emoji-label"><input type="radio" name="new-moment-feeling"
                                        value="shock" class="editor-emoji-input"><span
                                        class="editor-emoji-chip is-shock">😲</span></label>
                            </div>
                            <button type="submit"
                                class="editor-primary-btn">등록</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </dialog>

    <dialog id="ai-helper-modal"
        class="editor-ai-dialog">
        <form id="ai-helper-form" method="dialog" class="editor-ai-shell">
            <div class="editor-ai-header">
                <h3 class="editor-ai-title">AI 도우미</h3>
                <button type="button" onclick="closeAiHelper()"
                    class="editor-close-btn-round">
                    <svg class="editor-icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="editor-tab-row">
                <button type="button" id="ai-mode-tree-btn" onclick="setAiHelperMode('tree')"
                    class="editor-tab-btn is-active">트리 뼈대</button>
                <button type="button" id="ai-mode-comment-btn" onclick="setAiHelperMode('qa')"
                    class="editor-tab-btn">질문·도움말</button>
                <button type="button" id="ai-mode-node-btn" onclick="setAiHelperMode('node')"
                    class="editor-tab-btn">노드 수정</button>
            </div>
            <div class="editor-ai-body" id="ai-helper-body">
                <div id="ai-tree-panel" class="editor-ai-panel">
                    <label for="ai-tree-prompt" class="editor-ai-label">어떤 트리를 만들까요?</label>
                    <textarea id="ai-tree-prompt" rows="3"
                        class="editor-input"
                        placeholder="예: 뉴진스 활동을 입덕부터 최근 앨범까지 5단계로 정리해줘"></textarea>
                    <div class="editor-feeling-row">
                        <label for="ai-tree-count" class="editor-ai-label">노드 개수</label>
                        <select id="ai-tree-count"
                            class="editor-input-sm">
                            <option value="3">3</option>
                            <option value="4" selected>4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="8">8</option>
                        </select>
                    </div>
                </div>
                <div id="ai-comment-panel" class="editor-ai-panel is-hidden">
                    <label for="ai-comment-prompt" class="editor-ai-label">어떤 점이 궁금한가요?</label>
                    <textarea id="ai-comment-prompt" rows="3"
                        class="editor-input"
                        placeholder="예: 지금 트리 구조를 더 단순하게 만들고 싶은데 어떻게 나누면 좋을까?"></textarea>
                </div>
                <div id="ai-node-panel" class="editor-ai-panel is-hidden">
                    <p class="editor-ai-helper-text">노드를 선택한 뒤, 상단 \"AI 도우미\" 버튼을 누르거나 타임라인 카드/리스트 카드를 이 영역으로 드래그하면
                        이 노드를 기준으로 도와줍니다.</p>
                    <div id="ai-node-context"
                        class="editor-ai-context">
                    </div>
                    <label for="ai-node-prompt" class="editor-ai-label">이 노드를 어떻게
                        수정할까요?</label>
                    <textarea id="ai-node-prompt" rows="3"
                        class="editor-input"
                        placeholder="예: 제목과 설명을 더 감성적으로 바꾸고, 대표 무대 영상도 추천해줘"></textarea>
                </div>
                <div id="ai-result" class="editor-ai-panel"></div>
            </div>
            <div class="editor-ai-actions">
                <button id="ai-helper-cancel" type="button" onclick="onAiHelperCancel()"
                    class="editor-subtle-btn">닫기</button>
                <button id="ai-helper-submit" type="submit"
                    class="editor-primary-btn">생성</button>
            </div>
        </form>
    </dialog>

    <!-- Comments Modal -->
    <dialog id="comments-modal"
        class="editor-comments-dialog">
        <div class="editor-comments-shell">
            <div class="editor-comments-header">
                <h3 class="editor-comments-title">댓글 <span id="modal-comment-count"
                        class="editor-comment-count">0</span></h3>
                <button onclick="closeModal('comments-modal')"
                    class="editor-close-btn-round">
                    <svg class="editor-icon-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>

            <div id="comments-list" class="editor-comments-body custom-scroll">
                <!-- Comments injected here -->
                <div class="editor-comments-empty">
                    <svg class="editor-empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                        </path>
                    </svg>
                    <p>첫 번째 댓글을 남겨보세요!</p>
                </div>
            </div>

            <div class="editor-comments-input-wrap">
