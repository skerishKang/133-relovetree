<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <title>사랑의 흐름 - Lovetree</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS Unified Design System V3 -->
    <link rel="stylesheet" href="/assets/css/app-base.css?v=20260414_v10">
    <link rel="stylesheet" href="/assets/css/community-tree-detail.css?v=20260414_v10">
    <link rel="stylesheet" href="/assets/css/index-responsive.css?v=20260414_v10">
    <style>
        .mob-layout { background: #fdfaf4; min-height: 100vh; padding-bottom: 80px; }
        .trunk-container { width: 100%; position: relative; padding: 40px 0; }
        .trunk-line-v3 { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: rgba(181, 110, 110, 0.2); transform: translateX(-50%); }
    </style>
</head>
<body class="ctd-page mob-layout">
    
    <!-- Slim Header (Branding Optimized) -->
    <header class="ctd-header" style="background: rgba(253, 250, 244, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0;">
        <a href="/pages/my-trees.html" class="back-link">‹</a>
        <div class="header-center-info">
            <h1 id="tree-name-display" style="font-size: 1.1rem; font-weight: 900;">러브트리</h1>
            <p id="tree-author-display" style="font-size: 0.75rem; color: #b56e6e;">사랑의 성장 기록</p>
        </div>
        <div class="header-logo" style="margin-left: 0;">
            <a href="/" style="font-weight: 900; font-size: 1.1rem; color: #0f172a;">Lovetree</a>
        </div>
    </header>

    <main class="trunk-container">
        <!-- Vertical Trunk (Image 3) -->
        <div class="trunk-line-v3"></div>

        <section class="tree-canvas-inner" id="tree-canvas">
            <!-- Zigzag Nodes will be rendered here by JS. -->
            <div id="loading-spinner" style="text-align: center; padding: 100px 0;">
                <p style="font-weight: 800; color: #b56e6e;">사랑의 기억을 불러오는 중...</p>
            </div>
        </section>
    </main>

    <!-- Navigation Guard & App Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="/src/runtime-config.js?v=20260414_v3"></script>
    <script src="/src/shared-layout.js?v=20260414_v10"></script>
    <script src="/src/shared.js?v=20260414_v10"></script>
    <script src="/src/auth.js?v=20260414_v10"></script>
    <script src="/src/mobile-tree.js?v=20260414_v10"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.initStandardAuthUI) window.initStandardAuthUI();
        });
    </script>
    <script src="/src/api.js?v=20260414_v3"></script>
    <script src="/src/mobile-tree.js?v=20260414_v3"></script>
</body>
</html>
